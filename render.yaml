services:
  - type: web
    name: homestay-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed-prod.js
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
