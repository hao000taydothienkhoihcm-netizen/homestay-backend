<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,viewport-fit=cover"/>
<meta name="theme-color" content="#F1EEE3"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>HomeStay Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F1EEE3;--card:#FDFBF6;--el:#FFFFFF;--hov:#EDE8DC;
  --br:rgba(124,106,78,0.18);--br2:rgba(124,106,78,0.32);
  --gold:#7C6A4E;--gl:#5C4E38;--gd:rgba(124,106,78,0.1);
  --grn:#5E7E5B;--grl:#3A6037;--grd:rgba(94,126,91,0.12);
  --red:#B85C4A;--rdd:rgba(184,92,74,0.12);
  --sky:#5A7A96;--skd:rgba(90,122,150,0.1);
  --amb:#A07840;--amd:rgba(160,120,64,0.12);
  --pur:#7A6890;
  --t1:#2E2416;--t2:#7C6A4E;--t3:#B5A48A;
  --sand:#DFD4C0;--sw:224px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:13px}
h1,h2,h3{font-family:'Playfair Display',serif}
/* Force all Playfair Display text to use tabular lining figures (số thẳng hàng) */
[style*="Playfair Display"], [style*="playfair"]{font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum","lnum"}
.num-aligned, .money-val{font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum","lnum"}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#C8BC9E;border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:var(--sw);background:var(--sand);border-right:1px solid var(--br2);display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--br2)}
.sb-mark{width:34px;height:34px;background:linear-gradient(135deg,#7C6A4E,#5C4E38);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:8px}
.sb-brand h2{font-size:15px;color:#5C4E38}
.sb-brand p{font-size:10px;color:var(--t3)}
.sb-user{padding:11px 14px;border-bottom:1px solid var(--br2);display:flex;align-items:center;gap:9px}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7C6A4E,#5C4E38);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#FDFBF6;flex-shrink:0}
.sb-nav{flex:1;padding:7px 9px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.ns{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);padding:8px 9px 3px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:#7C6A4E;font-size:12px;font-weight:500;transition:all 0.15s;user-select:none}
.ni:hover{background:rgba(124,106,78,0.1);color:#2E2416}
.ni.on{background:rgba(124,106,78,0.15);color:#2E2416;font-weight:700}
.nbadge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:9px}
.sb-bot{padding:9px;border-top:1px solid var(--br2)}
.btn-logout{width:100%;padding:8px;background:transparent;border:1px solid var(--br2);border-radius:7px;color:#5C4E38;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;background:var(--sand);border-bottom:1px solid var(--br2);padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-l p{font-size:10px;color:var(--t3)}
.tb-l h3{font-size:14px;font-weight:700;color:#5C4E38}
.tb-r{display:flex;align-items:center;gap:9px}
.red-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(184,92,74,0.1);border:1px solid rgba(184,92,74,0.3);border-radius:6px;font-size:11px;color:var(--red)}
.content{flex:1;overflow-y:auto;padding:18px}

/* CARDS */
.card{background:var(--card);border:1px solid rgba(124,106,78,0.15);border-radius:11px;padding:15px;margin-bottom:14px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ct{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:6px}

/* STAT CARDS */
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
.sc{background:var(--card);border:1px solid rgba(124,106,78,0.18);border-radius:11px;padding:13px 15px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.g::before{background:linear-gradient(90deg,#7C6A4E,transparent)}
.sc.gr::before{background:linear-gradient(90deg,#5E7E5B,transparent)}
.sc.r::before{background:linear-gradient(90deg,#B85C4A,transparent)}
.sc.b::before{background:linear-gradient(90deg,#5A7A96,transparent)}
.sc.p::before{background:linear-gradient(90deg,#7A6890,transparent)}
.sl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:5px}
.sv{font-size:19px;font-weight:700;font-family:'Playfair Display',serif}
.sv.gold{color:#5C4E38}.sv.green{color:#3A6037}.sv.red{color:#B85C4A}.sv.blue{color:#5A7A96}.sv.pur{color:#7A6890}
.ss{font-size:10px;color:var(--t3);margin-top:3px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:none;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:inherit}
.btn-gold{background:linear-gradient(135deg,#7C6A4E,#5C4E38);color:#FDFBF6;font-weight:600}
.btn-gold:hover{background:linear-gradient(135deg,#6B5B40,#4A3D2A)}
.btn-ok{background:rgba(94,126,91,0.12);border:1px solid rgba(58,96,55,0.3);color:#3A6037}
.btn-ok:hover{background:rgba(94,126,91,0.22)}
.btn-out{background:transparent;border:1px solid rgba(124,106,78,0.35);color:#7C6A4E}
.btn-out:hover{border-color:#5C4E38;color:#5C4E38;background:rgba(124,106,78,0.06)}
.btn-danger{background:rgba(184,92,74,0.1);border:1px solid rgba(184,92,74,0.3);color:#B85C4A}
.btn-danger:hover{background:rgba(184,92,74,0.2)}
.btn-sky{background:rgba(90,122,150,0.1);border:1px solid rgba(90,122,150,0.3);color:#5A7A96}
.btn-amber{background:rgba(160,120,64,0.1);border:1px solid rgba(160,120,64,0.3);color:#7A5C30}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-sm{padding:5px 11px;font-size:12px}

/* HOME CARDS */
.hg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.hc{background:var(--card);border:1px solid rgba(124,106,78,0.2);border-radius:12px;padding:14px;position:relative;transition:border-color 0.2s}
.hc.occupied{border-color:rgba(58,96,55,0.4);background:rgba(94,126,91,0.05)}
.hc.checkout{border-color:rgba(184,92,74,0.4);background:rgba(184,92,74,0.05)}
.hc.checkin{border-color:rgba(160,120,64,0.4);background:rgba(160,120,64,0.05)}
.hc-dot{width:9px;height:9px;border-radius:50%;position:absolute;top:13px;right:13px}
.hc-info{background:rgba(124,106,78,0.07);border-radius:7px;padding:9px 11px;margin-top:10px;font-size:11px}
.hc-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.hc-row label{color:var(--t2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-stay{background:rgba(90,122,150,0.12);color:#5A7A96;border:1px solid rgba(90,122,150,0.25)}
.b-co{background:rgba(184,92,74,0.12);color:#B85C4A;border:1px solid rgba(184,92,74,0.28)}
.b-ci{background:rgba(94,126,91,0.12);color:#3A6037;border:1px solid rgba(94,126,91,0.28)}
.b-conf{background:rgba(160,120,64,0.12);color:#7A5C30;border:1px solid rgba(160,120,64,0.28)}
.b-done{background:rgba(124,106,78,0.08);color:#7C6A4E;border:1px solid rgba(124,106,78,0.2)}
.b-admin{background:rgba(124,106,78,0.12);color:#5C4E38;border:1px solid rgba(124,106,78,0.3)}
.b-manager{background:rgba(94,126,91,0.12);color:#3A6037;border:1px solid rgba(94,126,91,0.25)}
.b-staff{background:rgba(90,122,150,0.1);color:#5A7A96;border:1px solid rgba(90,122,150,0.25)}
.b-active{background:rgba(94,126,91,0.12);color:#3A6037}
.b-locked{background:rgba(184,92,74,0.12);color:#B85C4A}

/* TIME PILLS */
.tp{display:inline-flex;align-items:center;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(94,126,91,0.12);color:#3A6037;border:1px solid rgba(94,126,91,0.25)}
.tp.out{background:rgba(184,92,74,0.1);color:#B85C4A;border-color:rgba(184,92,74,0.25)}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--t3);font-weight:500;border-bottom:1px solid rgba(124,106,78,0.2);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid rgba(124,106,78,0.1);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#EDE8DC}

/* PROGRESS */
.pbar{height:5px;background:rgba(124,106,78,0.15);border-radius:3px;overflow:hidden;margin-top:5px}
.pbf{height:100%;border-radius:3px;transition:width 0.4s}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(46,36,22,0.6);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--el);border:1px solid rgba(124,106,78,0.3);border-radius:16px;padding:24px;width:570px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.modal.sm{width:430px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid rgba(124,106,78,0.15)}
.mt2{font-size:15px;color:#5C4E38;font-weight:700;font-family:'Playfair Display',serif}
.mc{width:26px;height:26px;background:transparent;border:1px solid rgba(124,106,78,0.3);border-radius:50%;color:#7C6A4E;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all 0.15s}
.mc:hover{border-color:#B85C4A;color:#B85C4A}
.mfoot{display:flex;justify-content:flex-end;gap:9px;margin-top:16px;padding-top:13px;border-top:1px solid rgba(124,106,78,0.15)}

/* FORM */
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg{margin-bottom:11px}
.fl{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--t3);margin-bottom:4px}
.fc{width:100%;padding:8px 11px;background:#F1EEE3;border:1px solid rgba(124,106,78,0.3);border-radius:7px;color:#2E2416;font-family:inherit;font-size:13px;outline:none;transition:border-color 0.15s}
.fc:focus{border-color:#7C6A4E;box-shadow:0 0 0 2px rgba(124,106,78,0.1)}
.fc::placeholder{color:#B5A48A}
select.fc option{background:#FFFFFF}
textarea.fc{resize:vertical;min-height:60px}
.tbox{background:rgba(124,106,78,0.05);border-radius:8px;padding:13px 14px;margin-bottom:11px;border:1px solid rgba(124,106,78,0.18)}
.tbox-t{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:#7C6A4E;margin-bottom:9px;font-weight:600}

/* DATE INPUT custom */
.date-input-wrap{position:relative}
.date-input-wrap input[type=text]{font-family:'DM Sans',monospace;letter-spacing:1px}
.date-input-wrap .date-hint{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--t3);pointer-events:none}

/* PAY BOX */
.paybox{background:#F1EEE3;border:1px solid rgba(124,106,78,0.2);border-radius:8px;padding:12px 14px}
.pr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.pr label{color:var(--t2)}
.pr.tot{border-top:1px solid rgba(124,106,78,0.25);margin-top:6px;padding-top:8px;font-size:14px;font-weight:700}
.pr.tot label{color:var(--t1)}

/* CHARGE */
.ci-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(124,106,78,0.12);font-size:12px}
.ci-item:last-child{border-bottom:none}
.quick-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}

/* ALERTS */
.alert-co{background:#FDF5F3;border:1px solid rgba(184,92,74,0.3);border-left:3px solid #B85C4A;border-radius:0 9px 9px 0;padding:12px 14px;margin-bottom:11px}
.alert-ci{background:#F3F7F3;border:1px solid rgba(58,96,55,0.3);border-left:3px solid #5E7E5B;border-radius:0 9px 9px 0;padding:12px 14px;margin-bottom:11px}
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:9px}
.ag-f label{font-size:9px;color:var(--t3);text-transform:uppercase;display:block;margin-bottom:2px}
.ag-f span{font-size:12px;font-weight:500}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:#B5A48A;padding:5px 0;text-transform:uppercase}
.cal-cell{min-height:68px;background:#F8F4EC;border:1px solid rgba(124,106,78,0.18);border-radius:4px;padding:4px;font-size:10px;cursor:default;transition:all 0.15s}
.cal-cell.has-events:hover{background:#EDE8DC;border-color:#7C6A4E;transform:translateY(-1px);box-shadow:0 3px 8px rgba(124,106,78,0.15)}
.cal-cell.today{border-color:#7C6A4E;background:rgba(124,106,78,0.1)}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-day-num{font-size:12px;font-weight:600;margin-bottom:2px;color:#5C4E38}
.cal-ev{border-radius:3px;padding:2px 4px;font-size:10px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-ev.cin{background:rgba(94,126,91,0.18);color:#3A6037;border-left:2px solid #5E7E5B}
.cal-ev.cout{background:rgba(184,92,74,0.15);color:#B85C4A;border-left:2px solid #B85C4A}
.cal-ev.stay{background:rgba(90,122,150,0.12);color:#5A7A96;border-left:2px solid #5A7A96}
.cal-ev.done{opacity:0.55;filter:grayscale(0.35)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid rgba(124,106,78,0.2);margin-bottom:15px}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;font-weight:500;color:#7C6A4E;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;user-select:none}
.tab:hover{color:#2E2416}
.tab.on{color:#5C4E38;border-bottom-color:#7C6A4E;font-weight:600}

/* SEARCH */
.search-wrap{position:relative}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--t3);pointer-events:none}
.sinput{padding:7px 11px 7px 30px;background:#F1EEE3;border:1px solid rgba(124,106,78,0.3);border-radius:7px;color:#2E2416;font-size:12px;font-family:inherit;outline:none;width:190px;transition:border-color 0.15s}
.sinput:focus{border-color:#7C6A4E}

/* BAR CHART */
.bar-chart{display:flex;gap:8px;align-items:flex-end;height:110px;padding:0 4px}
.bbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bbar-in{width:100%;display:flex;gap:2px;align-items:flex-end;height:85px}
.bg-g{flex:1;background:#5E7E5B;border-radius:3px 3px 0 0}
.bg-r{flex:1;background:#B85C4A;border-radius:3px 3px 0 0}

/* STATISTICS — clean & spacious */
.stat-hero{background:linear-gradient(135deg,#FDFBF6 0%,#F1EEE3 100%);border:1px solid rgba(124,106,78,0.2);border-radius:14px;padding:20px 24px;margin-bottom:14px}
.stat-hero-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:5px}
.stat-hero-value{font-size:38px;font-weight:800;font-family:'Playfair Display',serif;line-height:1;color:#2E2416;margin-bottom:4px;letter-spacing:-1px;font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum","lnum"}
.stat-hero-value.green{color:#3A6037}
.stat-hero-value.red{color:#B85C4A}
.stat-hero-sub{font-size:13px;color:var(--t2);font-weight:500;font-variant-numeric:tabular-nums lining-nums}

.stat-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.stat-kpi{background:var(--card);border:1px solid rgba(124,106,78,0.15);border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.stat-kpi.green{border-left:4px solid #5E7E5B}
.stat-kpi.red{border-left:4px solid #B85C4A}
.stat-kpi.profit{border-left:4px solid #7C6A4E;background:linear-gradient(135deg,rgba(255,255,255,0.5),rgba(124,106,78,0.05))}
.stat-kpi-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;font-weight:600}
.stat-kpi-value{font-size:24px;font-weight:700;font-family:'Playfair Display',serif;line-height:1.1;color:#2E2416;font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum","lnum"}
.stat-kpi.green .stat-kpi-value{color:#3A6037}
.stat-kpi.red .stat-kpi-value{color:#B85C4A}
.stat-kpi.profit .stat-kpi-value{font-size:28px;color:#5C4E38}
.stat-kpi-sub{font-size:11.5px;color:var(--t2);margin-top:2px;font-variant-numeric:tabular-nums lining-nums}
.stat-kpi-trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:8px;margin-top:4px}
.stat-kpi-trend.up{background:rgba(94,126,91,0.12);color:#3A6037}
.stat-kpi-trend.down{background:rgba(184,92,74,0.12);color:#B85C4A}

.stat-filter-bar{background:var(--card);border:1px solid rgba(124,106,78,0.18);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.stat-filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
.stat-tab{padding:8px 16px;background:transparent;border:1px solid rgba(124,106,78,0.22);border-radius:8px;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit}
.stat-tab:hover{background:rgba(124,106,78,0.06);border-color:#7C6A4E}
.stat-tab.on{background:linear-gradient(135deg,#7C6A4E,#5C4E38);color:#FDFBF6;border-color:#5C4E38}

.stat-filter-sub{margin-top:12px;padding-top:12px;border-top:1px dashed rgba(124,106,78,0.2);display:flex;gap:11px;align-items:center;flex-wrap:wrap}
.stat-filter-sub label{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.stat-filter-sub select,.stat-filter-sub input[type="date"]{padding:7px 11px;background:#F1EEE3;border:1px solid rgba(124,106,78,0.3);border-radius:7px;font-size:12.5px;color:#2E2416;font-family:inherit;outline:none}
.stat-filter-sub select:focus,.stat-filter-sub input[type="date"]:focus{border-color:#7C6A4E}

.stat-section{background:var(--card);border:1px solid rgba(124,106,78,0.15);border-radius:12px;padding:18px 20px;margin-bottom:14px}
.stat-section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(124,106,78,0.1)}
.stat-section-title h3{font-size:14px;font-weight:700;color:#5C4E38;font-family:'Playfair Display',serif}
.stat-section-title .sub-info{font-size:11.5px;color:var(--t2)}

<script>
/* ───── DATA ───── */
const T = new Date();
const todayS = fmt(T);
const mn = T.getMonth(), yr = T.getFullYear();

// date utils — không dùng toISOString để tránh timezone
function fmt(d) {
  if (!(d instanceof Date)) d = new Date(d);
  const yy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return yy+'-'+mm+'-'+dd;
}
function addD(d, n) {
  const r = new Date(d); r.setDate(r.getDate()+n); return r;
}
// YYYY-MM-DD → DD/MM/YYYY
function fD(s) {
  if (!s) return '—';
  const p = String(s).split('-');
  if (p.length === 3) return p[2].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/'+p[0];
  return s;
}
// "YYYY-MM-DD HH:MM" → "DD/MM/YYYY HH:MM"
function fDT(s) {
  if (!s) return '—';
  const i = s.indexOf(' ');
  return i > 0 ? fD(s.slice(0,i))+' '+s.slice(i+1) : fD(s);
}
function nights(a,b) { return Math.max(1,Math.ceil((new Date(b)-new Date(a))/86400000)); }
// Đêm "cuối tuần" nếu tối bắt đầu rơi vào T6(5), T7(6) hoặc CN(0). Dùng UTC để khớp backend.
function isWeekendNight(t){ var d=new Date(t).getUTCDay(); return d===5||d===6||d===0; }
// Tổng tiền phòng theo 2 mức giá (ngày thường / cuối tuần) — khớp backend stayTotal()
function stayTotal(hm, ci, co){
  var wk=(hm.weekendPrice!=null && hm.weekendPrice>0)?hm.weekendPrice:hm.price;
  var start=new Date(ci).getTime(), end=new Date(co).getTime();
  var total=0, count=0;
  for(var t=start; t<end; t+=86400000){ total+=isWeekendNight(t)?wk:hm.price; count++; }
  if(count===0) total=hm.price;
  return total;
}
function money(n) { return new Intl.NumberFormat('vi-VN').format(Math.round(n||0))+'đ'; }
// Định dạng ô nhập tiền kiểu VN: chèn dấu chấm khi gõ (1.000.000)
function fmtNumInput(el){
  var digits=(el.value||'').replace(/\D/g,'');
  el.value = digits ? new Intl.NumberFormat('vi-VN').format(parseInt(digits)) : '';
}
// Đọc số nguyên từ ô đã định dạng (bỏ mọi ký tự không phải số)
function parseNum(v){ return parseInt((v||'').toString().replace(/\D/g,''))||0; }
// Số đã format sẵn để đổ vào value (rỗng nếu 0/không có)
function numVal(n){ return (n||n===0)&&n!=='' ? new Intl.NumberFormat('vi-VN').format(n) : ''; }

/* ═══════════════════════════════════════════════════════════════
   VIETNAMESE PHONE VALIDATION
   ═══════════════════════════════════════════════════════════════ */
// Đầu số hợp lệ (mobile + một số cố định Hà Nội/HCM)
// Mobile VN bắt đầu bằng: 03x, 05x, 07x, 08x, 09x (2 số sau là đầu nhà mạng)
// Cố định: 024 (HN), 028 (HCM), 02xx (các tỉnh)
const VN_PHONE_REGEX = /^(0|84|\+84)(3[2-9]|5[25689]|7[06-9]|8[1-9]|9[0-9]|2[0-9])[0-9]{7,8}$/;

// Chuẩn hóa SĐT (loại bỏ space, dấu gạch, dấu chấm)
function normalizePhone(p) {
  if (!p) return '';
  return String(p).replace(/[\s.\-()]/g, '');
}

// Kiểm tra SĐT VN hợp lệ
function isValidVNPhone(p) {
  var n = normalizePhone(p);
  if (!n) return false;
  return VN_PHONE_REGEX.test(n);
}

// Format SĐT đẹp: 0901234567 → 0901 234 567
function formatPhone(p) {
  var n = normalizePhone(p);
  if (n.startsWith('+84')) n = '0' + n.slice(3);
  else if (n.startsWith('84')) n = '0' + n.slice(2);
  if (n.length === 10) return n.slice(0,4) + ' ' + n.slice(4,7) + ' ' + n.slice(7);
  if (n.length === 11) return n.slice(0,4) + ' ' + n.slice(4,7) + ' ' + n.slice(7);
  return n;
}

// Lấy thông báo lỗi cụ thể
function getPhoneError(p) {
  var n = normalizePhone(p);
  if (!n) return 'Vui lòng nhập số điện thoại';
  if (!/^[0-9+]+$/.test(n)) return 'SĐT chỉ được chứa số (và dấu +)';
  if (n.length < 10) return 'SĐT quá ngắn (cần ít nhất 10 số)';
  if (n.length > 12) return 'SĐT quá dài';
  if (!n.match(/^(0|84|\+84)/)) return 'SĐT phải bắt đầu bằng 0 (hoặc +84)';
  if (!isValidVNPhone(n)) return 'Đầu số không hợp lệ (vd: 09x, 08x, 07x, 03x, 05x)';
  return null; // ok
}

// Real-time format khi user gõ (chỉ giữ số, tự thêm dấu cách)
function vnPhoneFmt(el) {
  if (!el) return;
  var raw = el.value.replace(/[^0-9+]/g, '');
  // Giới hạn 13 ký tự (+84 hoặc 0 + 10 số)
  if (raw.length > 13) raw = raw.slice(0, 13);
  el.value = raw;
  // Update hint state
  var hint = document.getElementById(el.id + '-hint');
  if (!hint) return;
  if (raw.length === 0) {
    hint.style.color = 'var(--t3)';
    hint.textContent = 'Định dạng: 10 số (vd: 0901234567)';
  } else if (raw.length < 10) {
    hint.style.color = '#A07840';
    hint.textContent = '⚠ Cần thêm ' + (10 - raw.length) + ' số nữa';
  } else {
    var err = getPhoneError(raw);
    if (err) {
      hint.style.color = '#B85C4A';
      hint.textContent = '✗ ' + err;
    } else {
      hint.style.color = '#3A6037';
      hint.textContent = '✓ Số điện thoại hợp lệ';
    }
  }
}

// Validate khi blur
function vnPhoneCheck(el) {

/* ───── PHONE VN VALIDATION ─────
 * Hỗ trợ:
 *   - 0xx... (10 số)
 *   - +84xx... (11 ký tự sau +)
 *   - 84xx...
 * Đầu số hợp lệ: 03x, 05x, 07x, 08x, 09x (Viettel, Vinaphone, Mobifone, Vietnamobile, Gmobile, Itelecom, Reddi...)
 */
function normalizePhone(raw) {
  if (!raw) return '';
  // Loại bỏ khoảng trắng, dấu chấm, gạch ngang, ngoặc
  var s = String(raw).replace(/[\s.\-()]+/g, '');
  // +84xxx → 0xxx
  if (s.startsWith('+84')) s = '0' + s.slice(3);
  // 84xxx (không có +) → 0xxx — chỉ khi đủ dài 11 số bắt đầu bằng 84
  else if (s.startsWith('84') && s.length === 11) s = '0' + s.slice(2);
  return s;
}
function isValidVNPhone(raw) {
  var s = normalizePhone(raw);
  // Phải đúng 10 số, bắt đầu bằng 0, và prefix hợp lệ
  return /^0(3[2-9]|5[2-9]|7[06-9]|8[1-689]|9[0-46-9])\d{7}$/.test(s);
}
function formatPhoneDisplay(raw) {
  var s = normalizePhone(raw);
  if (s.length === 10) return s.slice(0,4) + ' ' + s.slice(4,7) + ' ' + s.slice(7);
  return raw;
}
// Money Short: rút gọn nhưng giữ độ chính xác. >=1tr dùng tr, dưới 1tr dùng k hoặc đầy đủ
function mS(n) {
  n = Math.round(n || 0);
  if (n === 0) return '0đ';
  const neg = n < 0; n = Math.abs(n);
  let out;
  if (n >= 1e9) out = (n / 1e9).toFixed(2).replace(/\.?0+$/, '') + ' tỷ';
  else if (n >= 1e6) out = (n / 1e6).toFixed(2).replace(/\.?0+$/, '') + 'tr';
  else if (n >= 1e3) out = (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'k';
  else out = n + 'đ';
  return (neg ? '−' : '') + out;
}

   ═══════════════════════════════════════════════════════════════ */
const API_BASE = 'https://homestay-backend-n61g.onrender.com/v1';
const TOKEN_KEY = 'homestay_token';
const USER_KEY = 'homestay_user';

async function apiCall(path, options = {}) {
  const token = localStorage.getItem(TOKEN_KEY);
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      ...(token && { Authorization: `Bearer ${token}` }),
      ...options.headers
    }
  });
  if (res.status === 401) {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USER_KEY);
    showLogin();
    throw new Error('Phiên đăng nhập đã hết hạn');
  }
  if (!res.ok) {
    let msg = 'Lỗi server';
    try { const err = await res.json(); msg = err.error || msg; } catch (e) {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

const api = {
  get: (path) => apiCall(path),
  post: (path, body) => apiCall(path, { method: 'POST', body: JSON.stringify(body) }),
  patch: (path, body) => apiCall(path, { method: 'PATCH', body: JSON.stringify(body) }),
  delete: (path) => apiCall(path, { method: 'DELETE' })
};

    wrap.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none';

    success: { bg: '#F3F7F3', border: 'rgba(58,96,55,0.3)', text: '#3A6037', icon: '✓' },
    error: { bg: '#FDF5F3', border: 'rgba(184,92,74,0.3)', text: '#B85C4A', icon: '⚠' },
    warn: { bg: '#FAF3E5', border: 'rgba(160,120,64,0.3)', text: '#7A5C30', icon: '⚠' }
  };
  const c = colors[type] || colors.info;

  t.style.cssText = `background:${c.bg};border:1px solid ${c.border};color:${c.text};padding:12px 16px;border-radius:10px;font-size:13px;box-shadow:0 6px 20px rgba(46,36,22,0.12);min-width:240px;max-width:380px;display:flex;align-items:flex-start;gap:8px;pointer-events:auto;animation:slideIn .3s ease`;

  wrap.appendChild(t);
  setTimeout(() => { t.style.transition='all .25s'; t.style.opacity='0'; t.style.transform='translateX(20px)'; setTimeout(()=>t.remove(), 250); }, duration);
}

// Booking đã nhận nhà (hoặc muộn hơn) → phụ thu NHẬN nhà đã được thu.
function isCheckedInWeb(b){
  return b.status==='checkedin' || b.status==='checkout_today' || b.status==='checkedout';
}
// Tổng tiền ĐÃ THU THỰC của 1 booking (vào tay)
// = cọc + thu khi nhận (tiền phòng) + phụ thu NHẬN nhà (khi đã nhận) + phụ thu TRẢ nhà (khi đã trả)
function actualReceived(b) {
  var dep = b.deposit||0;
  var ci  = b.paidAtCheckIn||0;  // thu khi nhận nhà (tiền phòng)
  // Phụ thu NHẬN nhà: đã thu ngay khi nhận nhà
  var chIn  = isCheckedInWeb(b) ? (b.checkinCharges||0) : 0;
  // Phụ thu TRẢ nhà: chỉ tính là ĐÃ THU khi khách đã trả nhà (checkedout)
  var chOut = b.status==='checkedout' ? (b.chargesTotal||0) : 0;
  // Nếu chưa có paidAtCheckIn nhưng đã checkedout → toàn bộ tiền phòng đã thu (sau giảm giá)
  if (b.status==='checkedout' && !b.paidAtCheckIn && ci===0) {
    ci = Math.max(0, b.totalAmount - (b.discount||0) - dep);
  }
  return dep + ci + chIn + chOut;
}
// Còn lại chưa thu (gồm phụ thu nhận nhà + phụ thu trả nhà)
function stillOwed(b) {
  if (b.status==='checkedout') return 0;
  var chInReceived = isCheckedInWeb(b) ? (b.checkinCharges||0) : 0;
  return Math.max(0,
    b.totalAmount - (b.discount||0)
    + (b.checkinCharges||0) + (b.chargesTotal||0)
    - (b.deposit||0) - (b.paidAtCheckIn||0) - chInReceived);
}

  if (!CU) return false;
  if (CU.role === 'admin') return true;
  if (CU.role === 'manager') return !isPastBK(b);
  return false;
}

/* ───── PRICE PREVIEW ───── */
function pricePreview(hmId, ci, co, dep, disc) {
  const hm = HOMES.find(h=>h.id===parseInt(hmId));
  if (!hm||!ci||!co) return '';
  const n = nights(ci,co);
  if (n<=0) return '<div style="color:#B85C4A;font-size:11px;padding:5px 0">⚠ Ngày trả phải sau ngày nhận</div>';
  const total = stayTotal(hm, ci, co);
  // Đếm số đêm cuối tuần để hiển thị (nếu căn có giá cuối tuần riêng)
  let wkN=0; { const s=new Date(ci).getTime(), e=new Date(co).getTime(); for(let t=s;t<e;t+=86400000){ if(isWeekendNight(t)) wkN++; } }
  const hasWk = (hm.weekendPrice!=null && hm.weekendPrice>0 && hm.weekendPrice!==hm.price);
  const breakdown = hasWk
    ? ' <span style="color:#8A7A5E;font-size:11px;font-weight:500">('+(n-wkN)+' thường + '+wkN+' cuối tuần)</span>'
    : '';
  const dc = Math.max(0, parseNum(disc));
  const net = Math.max(0, total - dc);      // tổng đơn sau giảm giá
  const d = parseNum(dep);
  const rem = Math.max(0,net-d);
  const pct = net>0?Math.min(100,(d/net)*100):0;
  return '<div class="paybox" style="margin-top:9px">'
    +'<div class="pr"><label>'+hm.emoji+' '+hm.name+' × '+n+' đêm'+breakdown+'</label><span style="color:#5C4E38;font-weight:600">'+money(total)+'</span></div>'
    +(dc>0?'<div class="pr"><label>Giảm giá</label><span style="color:#B85C4A">−'+money(dc)+'</span></div>'
          +'<div class="pr"><label>Tổng đơn sau giảm</label><span style="color:#5C4E38;font-weight:600">'+money(net)+'</span></div>':'')
    +'<div class="pr"><label>Tiền cọc</label><span style="color:#3A6037">−'+money(d)+'</span></div>'
    +'<div class="pr tot"><label>Thu thêm khi nhận nhà</label><span style="color:'+(rem>0?'#B85C4A':'#3A6037')+'">'+( rem>0?money(rem):'Đã đủ ✓')+'</span></div>'
    +'<div class="pbar"><div class="pbf" style="width:'+pct+'%;background:'+(rem<=0?'#5E7E5B':'#7C6A4E')+'"></div></div>'
    +'</div>';
}

/* ═══ KIỂM TRA TRÙNG LỊCH ═══
 * Quy định: mỗi căn nhà chỉ 1 booking trong 1 khoảng thời gian
 * Booking bị khóa khi: đã đặt confirmed HOẶC đã cọc (deposit > 0)
 * Trả về: chuỗi mô tả xung đột, hoặc '' nếu OK
 */
/* ═══ KIỂM TRA TRÙNG LỊCH ═══
 * Quy tắc nhà:
 * - Nhận nhà: 14:00  |  Trả nhà: 12:00
 * - Khách A trả 12/5 lúc 12:00 → Khách B nhận 12/5 lúc 14:00 = ĐƯỢC ✅
 * - Tức là: co_A === ci_B thì KHÔNG bị trùng (ngày trùng nhưng giờ khác nhau)
 * - Chỉ trùng thật khi: ci_mới < co_cũ VÀ co_mới > ci_cũ VÀ không phải trường hợp đặc biệt trên
 */
function checkConflict(hmId, ci, co, excludeId) {
  if (!hmId || !ci || !co) return '';
  const blocked = BOOKINGS.filter(function(b) {
    if (b.id === excludeId) return false;
    if (b.homeId !== hmId) return false;
    if (b.status === 'checkedout') return false;
    return true;
  });
  for (var i=0; i<blocked.length; i++) {
    var b = blocked[i];
    // Trường hợp đặc biệt: ngày trả của booking cũ == ngày nhận của booking mới
    // → Khách cũ trả 12:00, khách mới vào 14:00 → KHÔNG trùng
    if (co === b.checkIn || ci === b.checkOut) continue;
    // Kiểm tra overlap thật sự (không đụng vào trường hợp trên)
    if (ci < b.checkOut && co > b.checkIn) {
      var hm = gH(b.homeId);
      var msg = hm.emoji + ' ' + hm.name + ' đã có booking của <strong>' + b.guest + '</strong>'
              + ' từ <strong>' + fD(b.checkIn) + '</strong> đến <strong>' + fD(b.checkOut) + '</strong>';
      if ((b.deposit||0) > 0) msg += ' — đã cọc ' + money(b.deposit);
      else msg += ' — đã xác nhận';
      return msg;
    }
  }
  return '';
}

/* ═══ LỊCH TRỰC QUAN NGÀY ĐÃ ĐẶT (trong dialog booking) ═══ */
var BUSYCAL = {};
function bpad(n){ return String(n).padStart(2,'0'); }

function busyCalMap(hmId, excludeId) {
  // { 'YYYY-MM-DD': ['Tên khách', ...] } theo từng đêm (checkIn <= ngày < checkOut)
  var map = {};
  getBusyDates(parseInt(hmId), excludeId||0).forEach(function(b){
    if (!b.checkIn || !b.checkOut) return;
    var t = new Date(b.checkIn).getTime(), end = new Date(b.checkOut).getTime();
    for (; t < end; t += 86400000) {
      var dt = new Date(t);
      var ds = dt.getFullYear()+'-'+bpad(dt.getMonth()+1)+'-'+bpad(dt.getDate());
      (map[ds] = map[ds] || []).push(b.guest || 'Khách');
    }
  });
  return map;
}

    BUSYCAL[prefix] = { y: base.getFullYear(), m: base.getMonth(), stage: 0 };
  }
  var st = BUSYCAL[prefix];
  var y = st.y, m = st.m;
  var map = busyCalMap(hmId, excludeId);
  var MONTHS = ['Th1','Th2','Th3','Th4','Th5','Th6','Th7','Th8','Th9','Th10','Th11','Th12'];

  // header nav
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    + '<button type="button" onclick="busyCalNav(&#39;'+prefix+'&#39;,-1)" style="border:1px solid #E6DFCF;background:#fff;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;line-height:1">‹</button>'
    + '<span style="font-size:12px;font-weight:700;color:#2E2416">'+MONTHS[m]+' / '+y+'</span>'
    + '<button type="button" onclick="busyCalNav(&#39;'+prefix+'&#39;,1)" style="border:1px solid #E6DFCF;background:#fff;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;line-height:1">›</button>'
    + '</div>';
  // weekday row
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px">';
  WD.forEach(function(w,i){ h += '<div style="text-align:center;font-size:9.5px;font-weight:700;color:'+(i===6?'#B85C4A':'#8A7E68')+'">'+w+'</div>'; });
  h += '</div>';
  // day grid
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  var startOff = (new Date(y,m,1).getDay()+6)%7;
  var dim = new Date(y,m+1,0).getDate();
  for (var i=0;i<startOff;i++) h += '<div></div>';
  var todayDS = new Date().getFullYear()+'-'+bpad(new Date().getMonth()+1)+'-'+bpad(new Date().getDate());
  for (var d=1; d<=dim; d++) {
    var ds = y+'-'+bpad(m+1)+'-'+bpad(d);
    var names = map[ds];
    var isBusy = names && names.length;
    var inRange = ci && co && ds >= ci && ds < co;
    var isCI = ds === ci, isCO = ds === co;
    var bg='transparent', col='#2E2416', bd='1px solid transparent', fw='500';
    if (isBusy) { bg='rgba(184,92,74,0.16)'; col='#B85C4A'; fw='700'; }
    if (inRange) { bg='rgba(160,120,64,0.18)'; col='#5C4E38'; }
    if (isCI || isCO) { bg='#5C4E38'; col='#fff'; fw='800'; }
    var isToday = ds === todayDS;
    if (isToday && !isCI && !isCO) bd='1px solid #A07840';
    var title = isBusy ? names.join(', ') : '';
    h += '<button type="button" title="'+title.replace(/"/g,'&quot;')+'" onclick="busyCalPick(&#39;'+prefix+'&#39;,&#39;'+ds+'&#39;)" '
      + 'style="position:relative;aspect-ratio:1;border:'+bd+';border-radius:6px;background:'+bg+';color:'+col+';font-size:11px;font-weight:'+fw+';cursor:pointer;padding:0">'
      + d
      + (isBusy && !isCI && !isCO ? '<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#B85C4A"></span>' : '')
      + '</button>';
  }
  h += '</div>';
  // legend
  h += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:9.5px;color:#8A7E68">'
    + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(184,92,74,0.4);vertical-align:middle;margin-right:3px"></span>Đã đặt</span>'
    + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#5C4E38;vertical-align:middle;margin-right:3px"></span>Ngày đang chọn</span>'
    + '<span>👆 Bấm ngày để chọn nhận/trả</span>'
    + '</div>';
  h += '</div>';
  // Danh sách tên người đặt (giữ nguyên như cũ)
  h += renderBusyDates(hmId, excludeId);
  return h;
}

function busyCalNav(prefix, delta) {
  var st = BUSYCAL[prefix]; if (!st) return;
  var d = new Date(st.y, st.m + delta, 1);
  st.y = d.getFullYear(); st.m = d.getMonth();
  var hmId = document.getElementById(prefix+'-home')?.value;
  var excludeId = prefix === 'e' ? (parseInt(document.getElementById('ebk-id')?.value)||0) : 0;
  var el = document.getElementById(prefix+'-busy');
  if (el) el.innerHTML = renderBusyBlock(prefix, hmId, excludeId);
}

function busyCalPick(prefix, ds) {
  var ciEl = document.getElementById(prefix+'-ci');
  var coEl = document.getElementById(prefix+'-co');
  if (!ciEl || !coEl) return;
  if (!BUSYCAL[prefix]) BUSYCAL[prefix] = { y:0, m:0, stage:0 };
  var st = BUSYCAL[prefix];
  var nextDay = function(s){ return fmt(addD(new Date(s), 1)); };
  if (st.stage === 0 || !ciEl.value) {
    ciEl.value = ds;
    if (!coEl.value || coEl.value <= ds) coEl.value = nextDay(ds);
    st.stage = 1;
  } else {
    if (ds > ciEl.value) { coEl.value = ds; st.stage = 0; }
    else { ciEl.value = ds; coEl.value = nextDay(ds); st.stage = 1; }
  }
  var ciLbl = document.getElementById(prefix+'-ci-lbl'); if (ciLbl) ciLbl.textContent = fD(ciEl.value);
  var coLbl = document.getElementById(prefix+'-co-lbl'); if (coLbl) coLbl.textContent = fD(coEl.value);
  if (prefix === 'bk') updPrev(); else updEPrev();
  var hmId = document.getElementById(prefix+'-home')?.value;
  var excludeId = prefix === 'e' ? (parseInt(document.getElementById('ebk-id')?.value)||0) : 0;
  var el = document.getElementById(prefix+'-busy');
  if (el) el.innerHTML = renderBusyBlock(prefix, hmId, excludeId);
}

function updHomeInfo(src) {
  // Cập nhật thông tin bận/trống khi đổi nhà trong form thêm/sửa
  var hmId, excludeId, prefix;
  if (src === 'add') {
    hmId = document.getElementById('bk-home')?.value;
    excludeId = 0;
    prefix = 'bk';
    updPrev();
  } else {
    hmId = document.getElementById('e-home')?.value;
    excludeId = parseInt(document.getElementById('ebk-id')?.value)||0;
    prefix = 'e';
    updEPrev();
  }
  var el = document.getElementById(prefix+'-busy');
  if (el) el.innerHTML = renderBusyBlock(prefix, hmId, excludeId);
}

/* ───── AUTH (API) ───── */
async function doLogin() {
  const un = document.getElementById('l-un').value.trim();
  const pw = document.getElementById('l-pw').value;
  const errEl = document.getElementById('l-err');
  errEl.textContent = '';
  if (!un || !pw) { errEl.textContent = '⚠ Nhập đầy đủ thông tin'; return; }
  setLoading(true);
  try {
    const data = await api.post('/auth/login', { username: un, password: pw });
    localStorage.setItem(TOKEN_KEY, data.token);
    localStorage.setItem(USER_KEY, JSON.stringify(data.user));
    CU = normalizeUser(data.user);
    await onLoginSuccess();
  } catch (e) {
    errEl.textContent = '⚠ ' + e.message;
  } finally {
    setLoading(false);
  }
}

async function onLoginSuccess() {
  document.getElementById('pg-login').style.display = 'none';
  document.getElementById('pg-app').style.display = 'flex';
  document.getElementById('sb-av').textContent = CU.name.charAt(0);
  document.getElementById('sb-name').textContent = CU.name;
  document.getElementById('sb-role').textContent = RL[CU.role] || CU.role;
  startClock();
  await loadAllData();
  setPage('dashboard');
  toast('Chào ' + CU.name, 'success', 2000);
}

function doLogout() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
  CU = null;
  USERS = []; HOMES = []; BOOKINGS = []; EXPENSES = []; RULES = []; QUICK = [];
  showLogin();
}

function showLogin() {
  document.getElementById('pg-app').style.display = 'none';
  document.getElementById('pg-login').style.display = 'block';
  const pw = document.getElementById('l-pw'); if (pw) pw.value = '';
  const err = document.getElementById('l-err'); if (err) err.textContent = '';
}

async function tryAutoLogin() {
  const token = localStorage.getItem(TOKEN_KEY);
  const userStr = localStorage.getItem(USER_KEY);
  if (!token || !userStr) { showLogin(); return; }
  try {
    setLoading(true);
    // Verify token still valid
    const r = await api.get('/auth/me');
    CU = normalizeUser(r.user);
    await onLoginSuccess();
  } catch (e) {
    showLogin();
  } finally {
    setLoading(false);
  }
}

function startClock() {
  const tick = () => {
    const n = new Date();
    const ce = document.getElementById('clk');
    const de = document.getElementById('dtxt');
    if (ce) ce.textContent = n.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
    if (de) de.textContent = n.toLocaleDateString('vi-VN',{weekday:'short',day:'2-digit',month:'2-digit'});
  };
  tick(); setInterval(tick, 1000);
}

/* ───── ROUTER ───── */
const PTITLES = {dashboard:'Tổng quan',bookings:'Quản lý Booking',checkinout:'Nhận & Trả nhà',calendar:'Lịch đặt nhà',statistics:'Thống kê',finance:'Thu chi',users:'Tài khoản',homes:'Căn nhà',charges:'Phụ thu & Phạt'};
let curPage = 'dashboard';

function setPage(p) {
  if (p==='users'&&CU?.role!=='admin') return;
  if (p==='homes'&&CU?.role!=='admin') return;
  if (p==='charges'&&CU?.role==='staff') return;
  if (p==='statistics'&&CU?.role==='staff') return;
  if (p==='finance'&&CU?.role==='staff') return;
  curPage = p;
  document.querySelectorAll('.ni[data-p]').forEach(n => n.classList.toggle('on', n.dataset.p===p));
  document.getElementById('ptitle').textContent = PTITLES[p]||p;
  // Show/hide admin nav (sidebar)
  const nh = document.getElementById('nav-homes');
  const nu = document.getElementById('nav-users');
  const nc = document.getElementById('nav-charges');
  const nst = document.getElementById('nav-stats');
  const nfi = document.getElementById('nav-finance');
  if (nh) nh.style.display = CU?.role==='admin'?'flex':'none';
  if (nu) nu.style.display = CU?.role==='admin'?'flex':'none';
  if (nc) nc.style.display = CU?.role!=='staff'?'flex':'none';
  if (nst) nst.style.display = CU?.role!=='staff'?'flex':'none';
  if (nfi) nfi.style.display = CU?.role!=='staff'?'flex':'none';
  // Badge
  const coCount = BOOKINGS.filter(b=>b.checkOut===todayS&&b.status!=='checkedout').length;
  const ciCount = BOOKINGS.filter(b=>b.checkIn===todayS&&b.status==='confirmed').length;
  const total = coCount+ciCount;
  const nb = document.getElementById('nav-badge');
  const ap = document.getElementById('alert-pill');
  if (nb) { nb.textContent=total; nb.style.display=total?'':'none'; }
  if (ap) {
    ap.style.display = total?'':'none';
    if (total) ap.textContent = '🔔 '+(coCount?coCount+' trả nhà':'')+( coCount&&ciCount?' · ':'')+( ciCount?ciCount+' nhận nhà':'')+' hôm nay';
  }
  const c = document.getElementById('pcontent');
  const pages = {dashboard:renderDashboard,bookings:renderBookings,checkinout:renderCheckinOut,calendar:renderCalendar,statistics:renderStatistics,finance:renderFinance,users:renderUsers,homes:renderHomes,charges:renderCharges};
  c.innerHTML = pages[p] ? pages[p]() : '';
  closeSidebar(); // đóng ngăn kéo sau khi chọn trang (điện thoại)
}

/* ───── NGĂN KÉO SIDEBAR (ĐIỆN THOẠI) ───── */
function toggleSidebar() {
  const sb = document.getElementById('sb');
  const bd = document.getElementById('sb-backdrop');
  if (!sb) return;
  const open = sb.classList.toggle('open');
  if (bd) bd.classList.toggle('show', open);
}
function closeSidebar() {
  const sb = document.getElementById('sb');
  const bd = document.getElementById('sb-backdrop');
  if (sb) sb.classList.remove('open');
  if (bd) bd.classList.remove('show');
}

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.ni[data-p]').forEach(n=>n.addEventListener('click',()=>setPage(n.dataset.p)));
  tryAutoLogin();
});

  h += '<div class="card"><div class="ch"><div class="ct">📋 Booking gần đây</div><button class="btn btn-gold btn-xs" onclick="setPage(\'bookings\')">Xem tất cả</button></div><div class="tw"><table><thead><tr><th>Khách</th><th>Căn nhà</th><th>Nhận</th><th>Trả</th><th>Còn thu</th><th>TT</th></tr></thead><tbody>';
  [...BOOKINGS].sort((a,b)=>b.id-a.id).slice(0,5).forEach(b => {
    const hm=gH(b.homeId); const rem=Math.max(0,b.totalAmount-(b.discount||0)-(b.deposit||0));
    h += '<tr><td><div style="font-weight:600">'+b.guest+'</div><div style="font-size:10px;color:var(--t2)">'+b.phone+'</div></td>'
      +'<td style="font-size:11px">'+hm.emoji+' '+hm.name+'</td>'
      +'<td><div style="font-size:11px">'+fD(b.checkIn)+'</div><span class="tp">'+b.checkInTime+'</span></td>'
      +'<td><div style="font-size:11px">'+fD(b.checkOut)+'</div><span class="tp out">'+b.checkOutTime+'</span></td>'
      +'<td style="font-weight:'+(rem>0?700:400)+';color:'+(rem>0?'#B85C4A':'#3A6037')+'">'+money(rem)+'</td>'
      +'<td><span class="badge '+(SB[b.status]||'b-done')+'">'+(SL[b.status]||b.status)+'</span></td></tr>';
  });
  h += '</tbody></table></div></div>';

  // Finance mini — chỉ admin/quản lý
  if (!staff) {
    const maxV = Math.max(mRev,mExp,1);
    h += '<div class="card"><div class="ch"><div class="ct">💰 Thu chi tháng '+(mn+1)+'</div></div>';
    [{l:'Doanh thu',v:mRev,c:'#3A6037'},{l:'Chi phí',v:mExp,c:'#B85C4A'},{l:'Lợi nhuận',v:mRev-mExp,c:mRev-mExp>=0?'#5C4E38':'#B85C4A'}].forEach(r => {
      h += '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--t2)">'+r.l+'</span><span style="font-weight:700;color:'+r.c+'">'+mS(r.v)+'</span></div>'
        +'<div class="pbar"><div class="pbf" style="width:'+Math.max(0,Math.min(100,r.v/maxV*100))+'%;background:'+r.c+'"></div></div></div>';
    });
    h += '<div style="padding-top:9px;border-top:1px solid rgba(124,106,78,0.15)">'
      +'<div style="font-size:10px;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Theo căn nhà</div>';
    HOMES.forEach(hm => {
      const rv = BOOKINGS.filter(b=>b.homeId===hm.id&&b.status==='checkedout'&&new Date(b.checkOut).getMonth()===mn).reduce((s,b)=>s+b.totalAmount,0);
      h += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(124,106,78,0.1)"><span>'+hm.emoji+' '+hm.name+'</span><span style="color:#5C4E38;font-weight:600">'+mS(rv)+'</span></div>';
    });
    h += '</div></div>';
  }
  h += '</div>';
  return h;
}

/* ═══════════ BOOKINGS ═══════════ */
/* ═══════════ BOOKINGS PAGE ═══════════ */
var bkView = 'grid'; // 'grid' | 'list'
var bkFilters = { search: '', status: 'all', home: 'all', urgent: false };

function setBkView(v) { bkView = v; setPage('bookings'); }
function setBkFilter(key, val) {
  bkFilters[key] = val;
  applyBkFilters();
}
function clearBkSearch() {
  bkFilters.search = '';
  var el = document.getElementById('bk-search');
  if (el) el.value = '';
  applyBkFilters();
}
function applyBkFilters() {
  var s = bkFilters.search.toLowerCase().trim();
  var sNumOnly = s.replace(/[^0-9]/g, ''); // số đã loại bỏ không phải số
  var st = bkFilters.status;
  var hm = bkFilters.home;
  var filtered = BOOKINGS.filter(function(b){
    if (s) {
      var matched = false;
      // Tìm theo tên khách
      if (b.guest && b.guest.toLowerCase().includes(s)) matched = true;
      // Tìm theo SĐT (so sánh sau khi chuẩn hóa)
      else if (sNumOnly && normalizePhone(b.phone).includes(sNumOnly)) matched = true;
      // Tìm theo ghi chú
      else if (b.notes && b.notes.toLowerCase().includes(s)) matched = true;
      // Tìm theo ID booking (gõ #5 hoặc 5)
      else if (sNumOnly && String(b.id) === sNumOnly) matched = true;
      // Tìm theo căn nhà
      else if (b.homeId) {
        var hmObj = HOMES.find(function(x){return x.id === b.homeId;});
        if (hmObj && hmObj.name.toLowerCase().includes(s)) matched = true;
      }
      if (!matched) return false;
    }
    if (st !== 'all' && b.status !== st) return false;
    if (hm !== 'all' && b.homeId !== parseInt(hm)) return false;
    if (bkFilters.urgent) {
      var isCO = b.checkOut===todayS && b.status!=='checkedout';
      var isCI = b.checkIn===todayS && b.status==='confirmed';
      if (!isCO && !isCI) return false;
    }
    return true;
  });
  var content = document.getElementById('bk-content');
  var counter = document.getElementById('bk-counter');
  if (content) content.innerHTML = bkView === 'grid' ? bkCards(filtered) : bkRows(filtered);
  if (counter) counter.textContent = filtered.length + ' / ' + BOOKINGS.length;
}

function renderBookings() {
  // Count by status
  var counts = {
    all: BOOKINGS.length,
    confirmed: BOOKINGS.filter(function(b){return b.status==='confirmed';}).length,
    checkedin: BOOKINGS.filter(function(b){return b.status==='checkedin';}).length,
    'checkout-today': BOOKINGS.filter(function(b){return b.status==='checkout-today';}).length,
    checkedout: BOOKINGS.filter(function(b){return b.status==='checkedout';}).length
  };
  var urgentCount = BOOKINGS.filter(function(b){
    return (b.checkOut===todayS && b.status!=='checkedout') || (b.checkIn===todayS && b.status==='confirmed');
  }).length;

  var h = '';
  // Toolbar
  h += '<div class="bk-toolbar">';
  h += '<div class="bk-toolbar-top">';
  // Search
  h += '<div class="bk-search-box"><span class="si">🔍</span>';
  h += '<input id="bk-search" type="text" placeholder="🔍 Tên khách, SĐT, ID, căn nhà, ghi chú..." value="'+(bkFilters.search||'')+'" oninput="bkFilters.search=this.value;applyBkFilters()"/>';
  h += '<button class="clr" onclick="clearBkSearch()">✕</button></div>';
  // Right side
  h += '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">';
  h += '<span id="bk-counter" style="font-size:11.5px;color:var(--t2);font-weight:600">'+BOOKINGS.length+' / '+BOOKINGS.length+'</span>';
  h += '<div class="bk-view-toggle">';
  h += '<button class="'+(bkView==='grid'?'on':'')+'" onclick="setBkView(\'grid\')">⊞ Card</button>';
  h += '<button class="'+(bkView==='list'?'on':'')+'" onclick="setBkView(\'list\')">☰ Bảng</button>';
  h += '</div>';
  h += '<button class="btn btn-out btn-sm" onclick="exportBookingsExcel()" title="Xuất Excel">📥 Excel</button>';
  h += '<button class="btn btn-gold btn-sm" onclick="openAddBK()">+ Thêm booking</button>';
  h += '</div>';
  h += '</div>';

  // Filter pills
  h += '<div class="bk-filters">';
  h += '<span class="bk-filter-label">Trạng thái:</span>';
  h += '<button class="bk-pill '+(bkFilters.status==='all'?'on':'')+'" onclick="setBkFilter(\'status\',\'all\')">Tất cả <span class="cnt">'+counts.all+'</span></button>';
  h += '<button class="bk-pill cf '+(bkFilters.status==='confirmed'?'on':'')+'" onclick="setBkFilter(\'status\',\'confirmed\')">Đã đặt <span class="cnt">'+counts.confirmed+'</span></button>';
  h += '<button class="bk-pill in '+(bkFilters.status==='checkedin'?'on':'')+'" onclick="setBkFilter(\'status\',\'checkedin\')">Đang ở <span class="cnt">'+counts.checkedin+'</span></button>';
  h += '<button class="bk-pill tod '+(bkFilters.status==='checkout-today'?'on':'')+'" onclick="setBkFilter(\'status\',\'checkout-today\')">Trả hôm nay <span class="cnt">'+counts['checkout-today']+'</span></button>';
  h += '<button class="bk-pill done '+(bkFilters.status==='checkedout'?'on':'')+'" onclick="setBkFilter(\'status\',\'checkedout\')">Đã trả <span class="cnt">'+counts.checkedout+'</span></button>';
  if (urgentCount > 0) {
    h += '<span style="border-left:1px solid rgba(124,106,78,0.2);height:18px;margin:0 2px"></span>';
    h += '<button class="bk-pill tod '+(bkFilters.urgent?'on':'')+'" onclick="setBkFilter(\'urgent\','+(!bkFilters.urgent)+')">🔔 Hôm nay <span class="cnt">'+urgentCount+'</span></button>';
  }
  // Home filter
  if (HOMES.length > 1) {
    h += '<span style="border-left:1px solid rgba(124,106,78,0.2);height:18px;margin:0 2px"></span>';
    h += '<span class="bk-filter-label">Căn:</span>';
    h += '<button class="bk-pill '+(bkFilters.home==='all'?'on':'')+'" onclick="setBkFilter(\'home\',\'all\')">Tất cả</button>';
    HOMES.forEach(function(hm){
      var cnt = BOOKINGS.filter(function(b){return b.homeId===hm.id;}).length;
      h += '<button class="bk-pill '+(bkFilters.home===String(hm.id)?'on':'')+'" onclick="setBkFilter(\'home\',\''+hm.id+'\')">'+hm.emoji+' '+hm.name+' <span class="cnt">'+cnt+'</span></button>';
    });
  }
  h += '</div></div>';

  // Content
  h += '<div id="bk-content">' + (bkView === 'grid' ? bkCards(BOOKINGS) : bkRows(BOOKINGS)) + '</div>';
  return h;
}

function bkCards(list) {
  if (!list.length) return '<div class="card" style="text-align:center;padding:50px 20px;color:var(--t3)"><div style="font-size:40px;margin-bottom:10px">📭</div><div style="font-size:14px">Không có booking phù hợp với bộ lọc</div></div>';

  var bannerCfg = {
    confirmed: {cls:'cf', text:'Đã đặt'},
    checkedin: {cls:'in', text:'Đang ở'},
    'checkout-today': {cls:'tod', text:'Trả hôm nay'},
    checkedout: {cls:'done', text:'Đã trả'}
  };

  // Sort: urgent first, then by check-in date
  var sorted = list.slice().sort(function(a,b){
    var aUrgent = (a.checkOut===todayS && a.status!=='checkedout') || (a.checkIn===todayS && a.status==='confirmed');
    var bUrgent = (b.checkOut===todayS && b.status!=='checkedout') || (b.checkIn===todayS && b.status==='confirmed');
    if (aUrgent !== bUrgent) return aUrgent ? -1 : 1;
    var order = {checkedin:0, 'checkout-today':1, confirmed:2, checkedout:3};
    if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
    return new Date(b.checkIn) - new Date(a.checkIn);
  });

  var h = '<div class="bk-grid">';
  sorted.forEach(function(b){
    var hm = gH(b.homeId);
    var n = nights(b.checkIn, b.checkOut);
    var rec = actualReceived(b);
    var owed = stillOwed(b);
    var fullyPaid = owed === 0;
    var isCO = b.checkOut===todayS && b.status!=='checkedout';
    var isCI = b.checkIn===todayS && b.status==='confirmed';
    var cfg = bannerCfg[b.status] || {cls:'done', text:b.status};
    var urgent = isCI || isCO;

    h += '<div class="bk-card '+(urgent?'urgent':(b.status==='checkedin'?'active':''))+'">';
    // Banner
    h += '<div class="bk-card-banner '+cfg.cls+'">';
    h += '<span>'+(isCI?'🔔 NHẬN HÔM NAY':isCO?'🔔 TRẢ HÔM NAY':cfg.text)+'</span>';
    h += '<span style="font-size:9.5px;opacity:0.85">#'+b.id+'</span>';
    h += '</div>';
    // Body
    h += '<div class="bk-card-body" onclick="openBKDetail('+b.id+')" style="cursor:pointer">';
    // Guest
    h += '<div class="bk-guest-row">';
    h += '<div class="bk-guest-av">'+b.guest.charAt(0).toUpperCase()+'</div>';
    h += '<div class="bk-guest-info">';
    h += '<div class="bk-guest-name" title="'+b.guest+'">'+b.guest+'</div>';
    h += '<div class="bk-guest-phone">📞 '+formatPhone(b.phone)+'</div>';
    h += '</div></div>';
    // Home
    h += '<div class="bk-home-row"><span class="em">'+hm.emoji+'</span><span style="font-weight:600">'+hm.name+'</span><span class="meta">'+n+' đêm · '+b.guests+' người</span></div>';
    // Dates
    h += '<div class="bk-dates-row">';
    h += '<div class="bk-date"><div class="bk-date-lbl">Nhận</div><div class="bk-date-val">'+fD(b.checkIn)+'</div><div class="bk-date-time">⏱ '+b.checkInTime+(b.actualCI?' ✓':'')+'</div></div>';
    h += '<div class="bk-date-arrow">→</div>';
    h += '<div class="bk-date"><div class="bk-date-lbl">Trả</div><div class="bk-date-val">'+fD(b.checkOut)+'</div><div class="bk-date-time">⏱ '+b.checkOutTime+(b.actualCO?' ✓':'')+'</div></div>';
    h += '</div>';
    // Money
    h += '<div class="bk-money-row">';
    h += '<div class="bk-money-cell tot"><div class="lbl">Tiền nhà</div><div class="val">'+money(b.totalAmount)+'</div></div>';
    h += '<div class="bk-money-cell dep"><div class="lbl">Đã thu</div><div class="val">'+money(rec)+'</div></div>';
    h += '<div class="bk-money-cell rem '+(owed>0?'owed':'paid')+'"><div class="lbl">'+(owed>0?'Còn lại':'Tình trạng')+'</div><div class="val">'+(owed>0?money(owed):'✓ Đủ')+'</div></div>';
    h += '</div>';
    // Note (if any)
    if (b.notes) {
      h += '<div class="bk-note">📝 <span>'+b.notes.replace(/</g,'&lt;').slice(0,80)+(b.notes.length>80?'...':'')+'</span></div>';
    }
    h += '</div>';
    // Actions
    h += '<div class="bk-card-actions">';
    if (isCI) {
      h += '<button class="btn btn-ok btn-sm primary" onclick="openCI('+b.id+')">📋 Nhận nhà</button>';
    } else if (isCO || b.status==='checkedin') {
      h += '<button class="btn btn-ok btn-sm primary" onclick="openCO('+b.id+')">🔑 Trả nhà</button>';
    } else if (b.status==='checkedout' && CU && CU.role==='admin') {
      h += '<button class="btn btn-amber btn-sm" onclick="openCO('+b.id+')">💵 Phụ thu/Phạt</button>';
    }
    if (canEditBK(b)) {
      h += '<button class="btn btn-out btn-sm" onclick="openEditBK('+b.id+')">✏️ Sửa</button>';
      h += '<button class="btn btn-danger btn-sm" onclick="delBK('+b.id+')">🗑</button>';
    }
    h += '</div></div>';
  });
  h += '</div>';
  return h;
}

function bkRows(list) {
  if (!list.length) return '<div class="card" style="text-align:center;padding:40px;color:var(--t3)">📭 Không có booking phù hợp</div>';
  var sorted = list.slice().sort(function(a,b){
    var aUrgent = (a.checkOut===todayS && a.status!=='checkedout') || (a.checkIn===todayS && a.status==='confirmed');
    var bUrgent = (b.checkOut===todayS && b.status!=='checkedout') || (b.checkIn===todayS && b.status==='confirmed');
    if (aUrgent !== bUrgent) return aUrgent ? -1 : 1;
    return new Date(b.checkIn) - new Date(a.checkIn);
  });
  var t = '<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table class="stat-table" style="min-width:1000px"><thead><tr><th>#</th><th>Khách</th><th>Căn nhà</th><th class="center">Nhận</th><th class="center">Trả</th><th class="num">Tiền nhà</th><th class="num">Đã thu</th><th class="num">Còn lại</th><th class="center">Trạng thái</th><th class="center">Thao tác</th></tr></thead><tbody>';
  sorted.forEach(function(b){
    var hm = gH(b.homeId);
    var n = nights(b.checkIn,b.checkOut);
    var rec = actualReceived(b);
    var owed = stillOwed(b);
    var isCO = b.checkOut===todayS && b.status!=='checkedout';
    var isCI = b.checkIn===todayS && b.status==='confirmed';
    t += '<tr style="'+(isCO||isCI?'background:rgba(184,92,74,0.04)':'')+'">';
    t += '<td style="color:var(--t3);font-size:10.5px;font-weight:600">#'+b.id+'</td>';
    t += '<td><div style="font-weight:600">'+b.guest+'</div><div style="font-size:11px;color:var(--t3);margin-top:1px">'+b.phone+'</div></td>';
    t += '<td><div style="font-weight:500">'+hm.emoji+' '+hm.name+'</div><div style="font-size:10.5px;color:var(--t3);margin-top:1px">'+n+' đêm · '+b.guests+' người</div></td>';
    t += '<td class="center"><div style="font-size:12px;font-weight:500">'+fD(b.checkIn)+'</div><div style="font-size:10.5px;color:var(--t2);margin-top:1px">'+b.checkInTime+'</div></td>';
    t += '<td class="center"><div style="font-size:12px;font-weight:500">'+fD(b.checkOut)+'</div><div style="font-size:10.5px;color:var(--t2);margin-top:1px">'+b.checkOutTime+'</div></td>';
    t += '<td class="num" style="color:#5C4E38">'+money(b.totalAmount)+'</td>';
    t += '<td class="num" style="color:#3A6037">'+money(rec)+'</td>';
    t += '<td class="num" style="color:'+(owed>0?'#B85C4A':'#3A6037')+'">'+(owed>0?money(owed):'✓')+'</td>';
    t += '<td class="center"><span class="badge '+(SB[b.status]||'b-done')+'">'+(SL[b.status]||b.status)+'</span></td>';
    t += '<td class="center"><div style="display:inline-flex;gap:3px">';
    if (isCI) t += '<button class="btn btn-xs btn-amber" onclick="openCI('+b.id+')" title="Nhận nhà">📋</button>';
    if (isCO || b.status==='checkedin') t += '<button class="btn btn-xs btn-ok" onclick="openCO('+b.id+')" title="Trả nhà">🔑</button>';
    if (b.status==='checkedout' && CU && CU.role==='admin') t += '<button class="btn btn-xs btn-amber" onclick="openCO('+b.id+')" title="Thêm phụ thu/phạt">💵</button>';
    if (canEditBK(b)) {
      t += '<button class="btn btn-xs btn-out" onclick="openEditBK('+b.id+')" title="Sửa">✏️</button>';
      t += '<button class="btn btn-xs btn-danger" onclick="delBK('+b.id+')" title="Xóa">🗑</button>';
    }
    t += '</div></td></tr>';
  });
  t += '</tbody></table></div></div>';
  return t;
}

// Backward compatibility
function fbk() { applyBkFilters(); }

/* ═══════════ PHỤ THU (charges) trong form booking ═══════════ */
function chRowHTML(p, name, unit, qty, phase) {
  name = name||''; unit = unit||0; qty = qty||1;
  phase = (phase==='CHECKIN') ? 'CHECKIN' : 'CHECKOUT';
  return '<div class="ch-row" style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap">'
    +'<input class="fc ch-name" style="flex:2;min-width:110px;margin:0" placeholder="Tên (kê nệm...)" value="'+String(name).replace(/"/g,'&quot;')+'" maxlength="60"/>'
    +'<input class="fc ch-unit" style="flex:1.3;min-width:80px;margin:0" inputmode="numeric" placeholder="Đơn giá" value="'+(unit?numVal(unit):'')+'" oninput="fmtNumInput(this);chCalc(&#39;'+p+'&#39;)"/>'
    +'<input class="fc ch-qty" style="width:52px;margin:0;text-align:center" inputmode="numeric" placeholder="SL" value="'+qty+'" oninput="this.value=this.value.replace(/[^0-9]/g,&#39;&#39;);chCalc(&#39;'+p+'&#39;)"/>'
    +'<select class="fc ch-phase" style="flex:1.2;min-width:96px;margin:0">'
      +'<option value="CHECKIN"'+(phase==='CHECKIN'?' selected':'')+'>Nhận nhà</option>'
      +'<option value="CHECKOUT"'+(phase==='CHECKOUT'?' selected':'')+'>Trả nhà</option>'
    +'</select>'
    +'<button type="button" class="btn btn-out" style="padding:6px 9px;margin:0" onclick="this.parentNode.remove();chCalc(&#39;'+p+'&#39;)">✕</button>'
    +'</div>';
}
function chSectionHTML(p, list) {
  var rows = (list||[]).map(function(c){ return chRowHTML(p, c.name, c.unit, c.qty, c.phase); }).join('');
  var tot = (list||[]).reduce(function(s,c){ return s+(c.amount||((c.unit||0)*(c.qty||1))); },0);
  return '<div class="tbox"><div class="tbox-t">➕ Phụ thu / Phát sinh</div>'
    +'<div style="font-size:10px;color:var(--t3);margin-bottom:6px">Mặc định <strong>Nhận nhà</strong> (thu ngay khi giao chìa khóa). Khoản nào thu lúc trả (nước, phát sinh...) thì đổi sang <strong>Trả nhà</strong>.</div>'
    +'<div id="'+p+'-ch-list">'+rows+'</div>'
    +'<button type="button" class="btn btn-out" style="width:100%;margin-top:4px" onclick="chAdd(&#39;'+p+'&#39;)">+ Thêm phụ thu</button>'
    +'<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px"><span style="color:var(--t2);font-weight:600">Tổng phụ thu</span><span id="'+p+'-ch-tot" style="color:#3A6037;font-weight:700">'+(tot>0?money(tot):'—')+'</span></div>'
    +'</div>';
}
function chAdd(p) {
  var box = document.getElementById(p+'-ch-list');
  if (box) box.insertAdjacentHTML('beforeend', chRowHTML(p, '', 0, 1, 'CHECKIN'));
}
function chCalc(p) {
  var box = document.getElementById(p+'-ch-list'); if (!box) return;
  var tot = 0;
  box.querySelectorAll('.ch-row').forEach(function(r){
    var u = parseNum(r.querySelector('.ch-unit') && r.querySelector('.ch-unit').value);
    var q = parseInt(r.querySelector('.ch-qty') && r.querySelector('.ch-qty').value)||1;
    tot += u*q;
  });
  var lbl = document.getElementById(p+'-ch-tot');
  if (lbl) lbl.textContent = tot>0 ? money(tot) : '—';
}
function chCollect(p) {
  var box = document.getElementById(p+'-ch-list'); if (!box) return [];
  var out = [];
  box.querySelectorAll('.ch-row').forEach(function(r){
    var name = ((r.querySelector('.ch-name') && r.querySelector('.ch-name').value)||'').trim();
    var unit = parseNum(r.querySelector('.ch-unit') && r.querySelector('.ch-unit').value);
    var qty = parseInt(r.querySelector('.ch-qty') && r.querySelector('.ch-qty').value)||1;
    var phase = (r.querySelector('.ch-phase') && r.querySelector('.ch-phase').value)==='CHECKIN' ? 'CHECKIN' : 'CHECKOUT';
    if (name && unit>0) out.push({ name: name, unit: unit, qty: qty, phase: phase });
  });
  return out;
}

async function updateBK(id) {

async function delBK(id) {
  const b = BOOKINGS.find(function(x){ return x.id===id; });
  if (!b) return;
  if(!canEditBK(b)){toast('Chỉ admin mới xoá được booking đã trả (quá khứ)','warn');return;}
  const dep = b.deposit||0;
  if (b.status === 'checkedin') {
    if (!confirm('Booking của ' + b.guest + ' đang ở trong nhà. Bạn chắc muốn xóa?')) return;
  } else if (dep > 0) {
    if (!confirm('Khách ' + b.guest + ' đã cọc ' + money(dep) + '. Xác nhận đã hoàn tiền cọc và xóa booking?')) return;
  } else {
    if (!confirm('Xóa booking của ' + b.guest + '?')) return;
  }
  setLoading(true);
  try {
    await api.delete('/bookings/' + id);
    await reloadBookings();
    toast('Đã xóa booking', 'success');
    setPage(curPage);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(false);
  }
}

function addCharge(name,unit,qty){
  qty=parseInt(qty)||1;
  unit=parseInt(unit)||0;
  _charges.push({id:Date.now(),name:name,unit:unit,qty:qty,amount:unit*qty});
  _renderCO();
}
function addCustomCharge(){
  const n=document.getElementById('nc-name')?.value?.trim();
  const u=parseNum(document.getElementById('nc-amt')?.value);
  const q=parseInt(document.getElementById('nc-qty')?.value)||1;
  if(!n||!u){toast('Nhập tên và đơn giá','warn');return;}
  _charges.push({id:Date.now(),name:n,unit:u,qty:q,amount:u*q});
  _renderCO();
}
function rmCharge(id){_charges=_charges.filter(c=>c.id!==id);_renderCO();}
