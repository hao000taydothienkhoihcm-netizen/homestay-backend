// Đêm `dateStr` của căn homeId có khách? (nhận <= đêm < trả). Đêm trả nhà coi như trống.
function homeOccupied(homeId, dateStr){
  for (var i=0;i<BOOKINGS.length;i++){ var b=BOOKINGS[i]; if(b.homeId!==homeId) continue; if(b.checkIn && b.checkOut && dateStr>=b.checkIn && dateStr<b.checkOut) return true; }
  return false;
}
function freeHomesOn(dateStr){ return HOMES.filter(function(h){ return !homeOccupied(h.id, dateStr); }); }

function renderCalendar() {
  const firstDow = new Date(calY, calM, 1).getDay();
  const daysInMonth = new Date(calY, calM+1, 0).getDate();
  // Hiển thị TẤT CẢ booking trên lịch (kể cả đã trả) để xem được tên khách những ngày đã qua.
  const oneHome = !!calHomeId;
  const vis = oneHome ? BOOKINGS.filter(function(b){return b.homeId===calHomeId;}) : BOOKINGS.slice();

  let h = '<div class="card">';
  // Nav
  h += '<div class="cal-nav">';
  h += '<button class="btn btn-out btn-sm" onclick="calPrev()">← Trước</button>';
  h += '<h3 style="font-size:15px;color:#5C4E38">'+MFULL[calM]+' '+calY+'</h3>';
  h += '<button class="btn btn-out btn-sm" onclick="calNext()">Sau →</button>';
  h += '</div>';
  // Bộ lọc căn
  h += '<div style="margin-bottom:8px"><select onchange="calSetHome(this.value)" style="width:100%;padding:8px 10px;border:1px solid rgba(124,106,78,0.3);border-radius:8px;font-size:13px;background:#fff;color:#5C4E38">';
  h += '<option value=""'+(!oneHome?' selected':'')+'>🏠 Tất cả các căn</option>';
  HOMES.forEach(function(hh){ h += '<option value="'+hh.id+'"'+(calHomeId===hh.id?' selected':'')+'>'+hh.emoji+' '+hh.name+'</option>'; });
  h += '</select></div>';
  h += '<div style="font-size:11px;color:var(--t3);margin-bottom:8px">'+(oneHome?('Xem 1 căn · ngày trống hiện <b style="color:#3A6037">Trống</b>'):(vis.length+' booking · ngày ghi số căn còn trống'))+'</div>';

  // Grid
  h += '<div class="cal-grid">';
  // Day headers
  DOW.forEach(function(d){ h += '<div class="cal-dow">'+d+'</div>'; });
  // Empty cells
  for (var i=0; i<firstDow; i++) {
    h += '<div class="cal-cell empty"></div>';
  }
  // Day cells
  for (var day=1; day<=daysInMonth; day++) {
    var dd = String(day).padStart(2,'0');
    var mm = String(calM+1).padStart(2,'0');
    var dateStr = calY+'-'+mm+'-'+dd;
    var isToday = (dateStr === todayS);

    // Get events for this day
    var evs = [];
    for (var bi=0; bi<vis.length; bi++) {
      var b = vis[bi];
      var ci = b.checkIn;
      var co = b.checkOut;
      if (ci === dateStr) evs.push({b:b, t:'cin'});
      else if (co === dateStr) evs.push({b:b, t:'cout'});
      else if (dateStr > ci && dateStr < co) evs.push({b:b, t:'stay'});
    }

    // Tính trống: 1 căn → đêm đó căn này có khách không; tất cả → số căn còn trống
    var freeList = oneHome ? (homeOccupied(calHomeId, dateStr) ? [] : [1]) : freeHomesOn(dateStr);
    var isFree = oneHome ? (freeList.length>0) : (freeList.length>0);

    var hasCO = evs.some(function(e){return e.t==='cout';});
    var cellStyle = hasCO && !isToday ? 'border-color:rgba(184,92,74,0.45)' : '';
    var clickAttr = (evs.length > 0 || (!oneHome && freeList.length>0)) ? ' onclick="showDayDetail(\''+dateStr+'\')" style="cursor:pointer;'+cellStyle+'"' : ' style="'+cellStyle+'"';
    h += '<div class="cal-cell'+(isToday?' today':'')+(evs.length>0?' has-events':'')+'"'+clickAttr+'>';
    h += '<div class="cal-day-num" style="'+(isToday?'color:#5C4E38;font-weight:800':'')+'">'+day+'</div>';

    var shown = evs.slice(0,3);
    for (var ei=0; ei<shown.length; ei++) {
      var ev = shown[ei];
      var hm = gH(ev.b.homeId);
      var parts = ev.b.guest.split(' ');
      var shortName = parts.length>=2 ? (parts[parts.length-2].charAt(0)+'. '+parts[parts.length-1]) : parts[0];
      var icon = ev.t==='cin'?'▶':(ev.t==='cout'?'■':'·');
      var doneCls = ev.b.status==='checkedout' ? ' done' : '';
      var tip = ev.b.guest+' — '+(hm.name||'?')+' ('+fD(ev.b.checkIn)+' → '+fD(ev.b.checkOut)+')'+(ev.b.status==='checkedout'?' — đã trả':'');
      h += '<div class="cal-ev '+ev.t+doneCls+'" title="'+tip+'">'+icon+' '+shortName+'</div>';
    }
    if (evs.length>3) h += '<div style="font-size:9px;color:var(--t3)">+'+( evs.length-3)+' nữa</div>';
    // Nhãn TRỐNG
    if (oneHome) {
      if (isFree) h += '<div style="margin-top:2px;font-size:9.5px;font-weight:700;color:#3A6037;background:rgba(94,126,91,0.14);border-radius:4px;padding:1px 4px;text-align:center">🟢 Trống</div>';
    } else if (freeList.length>0) {
      var fnames = freeList.map(function(x){return x.emoji+x.name;}).join(', ');
      h += '<div style="margin-top:2px;font-size:9px;font-weight:700;color:#3A6037;background:rgba(94,126,91,0.12);border-radius:4px;padding:1px 4px;text-align:center" title="Trống: '+fnames+'">🟢 '+freeList.length+' căn trống</div>';
    }
    h += '</div>';
  }
  h += '</div>';

  // Legend
  h += '<div style="display:flex;gap:14px;margin-top:11px;flex-wrap:wrap">';
  h += '<span style="font-size:11px;display:flex;align-items:center;gap:5px;color:#3A6037"><span style="width:8px;height:8px;border-radius:50%;background:#5E7E5B;display:inline-block"></span>▶ Nhận nhà</span>';
  h += '<span style="font-size:11px;display:flex;align-items:center;gap:5px;color:#B85C4A"><span style="width:8px;height:8px;border-radius:50%;background:#B85C4A;display:inline-block"></span>■ Trả nhà</span>';
  h += '<span style="font-size:11px;display:flex;align-items:center;gap:5px;color:#5A7A96"><span style="width:8px;height:8px;border-radius:50%;background:#5A7A96;display:inline-block"></span>· Đang ở</span>';
  h += '<span style="font-size:11px;display:flex;align-items:center;gap:5px;color:#9A8F7C;opacity:0.7"><span style="width:8px;height:8px;border-radius:50%;background:#9A8F7C;display:inline-block"></span>Mờ = đã trả (quá khứ)</span>';
  h += '<span style="font-size:11px;display:flex;align-items:center;gap:5px;color:#3A6037">🟢 Trống = đêm chưa có khách</span>';
  h += '</div></div>';
  return h;
}
function calPrev(){calM--;if(calM<0){calM=11;calY--;}setPage('calendar');}
function calNext(){calM++;if(calM>11){calM=0;calY++;}setPage('calendar');}

/* ═══════════ STATISTICS ═══════════ */
var statFilter = {
  mode: 'month',
  monthYear: null,
  year: null,
  from: null,
  to: null
};
function _initStatFilter() {
  if (!statFilter.monthYear) statFilter.monthYear = {month: mn, year: yr};
  if (!statFilter.year) statFilter.year = yr;
  if (!statFilter.from) { var d=new Date(); d.setDate(d.getDate()-30); statFilter.from = fmt(d); }
  if (!statFilter.to) statFilter.to = todayS;
}
function setStatMode(m) { statFilter.mode = m; setPage('statistics'); }
function setStatMonthYear(month, year) { statFilter.monthYear = {month: parseInt(month), year: parseInt(year)}; setPage('statistics'); }
function setStatYear(year) { statFilter.year = parseInt(year); setPage('statistics'); }
function setStatRange() {
  var from = document.getElementById('sf-from')?.value;
  var to = document.getElementById('sf-to')?.value;
  if (!from || !to) { toast('Chọn cả từ ngày và đến ngày', 'warn'); return; }
  if (from > to) { toast('Từ ngày phải <= đến ngày', 'warn'); return; }
  statFilter.from = from; statFilter.to = to;
  setPage('statistics');
}

function openHomePerf(id) {
  var hm = HOMES.find(function(x){return x.id===id;});
  if (!hm) return;
  var P = window._statPeriod || {bkInPeriod:[], expInPeriod:[], periodLabel:''};
  var bks = P.bkInPeriod.filter(function(b){return b.homeId===id;});
  var exps = P.expInPeriod.filter(function(e){return e.homeId===id;});

  // Thu: bóc tách tiền phòng / cọc / phụ thu (giống mục thống kê chung)
  var incCoc=0, incPhong=0, incPhu=0, received=0;
  bks.forEach(function(b){
    var dep=b.deposit||0, ci=b.paidAtCheckIn||0;
    var ch=(b.status==='checkedout'?(b.chargesTotal||0):0)+(isCheckedInWeb(b)?(b.checkinCharges||0):0);
    if (b.status==='checkedout' && !b.paidAtCheckIn && ci===0) ci=Math.max(0, b.totalAmount-(b.discount||0)-dep);
    incCoc+=dep; incPhong+=ci; incPhu+=ch;
    received+=actualReceived(b);
  });
  var totalExp = exps.reduce(function(s,e){return s+e.amount;},0);
  var profit = received - totalExp;
  var nightsSum = bks.reduce(function(s,b){return s+nights(b.checkIn,b.checkOut);},0);

  var incItems=[
    {name:'🏠 Tiền phòng', amt:incPhong, col:'#3A6037'},
    {name:'🔑 Tiền cọc', amt:incCoc, col:'#A07840'},
    {name:'➕ Phụ thu & phạt', amt:incPhu, col:'#7A6890'}
  ];
  var catColors = {'Điện nước':'#5A7A96','Dọn dẹp':'#5E7E5B','Sửa chữa':'#A07840','Vật tư':'#7A6890','Lương':'#B85C4A','Khác':'#B5A48A'};
  var byCat = {};
  exps.forEach(function(e){byCat[e.cat]=(byCat[e.cat]||0)+e.amount;});
  var catEntries = Object.entries(byCat).sort(function(a,b){return b[1]-a[1];});

  var h = '<div class="mh"><div class="mt2">' + hm.emoji + ' ' + hm.name + '</div><button class="mc" onclick="closeModal()">✕</button></div>';
  h += '<div style="font-size:12px;color:var(--t3);margin:2px 0 14px">Thu chi · ' + (P.periodLabel||'') + '</div>';

  // Summary 3 ô
  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  h += '<div style="background:#F8F4EC;border:1px solid rgba(124,106,78,0.15);border-left:3px solid #3A6037;border-radius:10px;padding:11px 13px"><div style="font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:3px">💵 Thực thu</div><div style="font-size:17px;font-weight:800;color:#3A6037;font-variant-numeric:tabular-nums">'+money(received)+'</div></div>';
  h += '<div style="background:#F8F4EC;border:1px solid rgba(124,106,78,0.15);border-left:3px solid #B85C4A;border-radius:10px;padding:11px 13px"><div style="font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:3px">💸 Chi phí</div><div style="font-size:17px;font-weight:800;color:#B85C4A;font-variant-numeric:tabular-nums">'+money(totalExp)+'</div></div>';
  h += '<div style="background:#F8F4EC;border:1px solid rgba(124,106,78,0.15);border-left:3px solid '+(profit>=0?'#3A6037':'#B85C4A')+';border-radius:10px;padding:11px 13px"><div style="font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:3px">📈 Lợi nhuận</div><div style="font-size:17px;font-weight:800;color:'+(profit>=0?'#3A6037':'#B85C4A')+';font-variant-numeric:tabular-nums">'+(profit>0?'+':'')+money(profit)+'</div></div>';
  h += '</div>';
  h += '<div style="font-size:11.5px;color:var(--t3);margin-bottom:16px">'+bks.length+' booking · '+nightsSum+' đêm'+(nightsSum?' · '+money(received/nightsSum)+'/đêm':'')+'</div>';

  // Khoản THU — từng booking
  h += '<div style="font-size:12px;font-weight:700;color:#3A6037;margin-bottom:8px">💵 KHOẢN THU · '+bks.length+' booking</div>';
  if (!bks.length) {
    h += '<div style="text-align:center;padding:16px;color:var(--t3);font-size:12px">📭 Không có booking</div>';
  } else {
    bks.slice().sort(function(a,b){return new Date(b.checkIn)-new Date(a.checkIn);}).forEach(function(b){
      var rec = actualReceived(b);
      var n = nights(b.checkIn, b.checkOut);
      var stLabel = (typeof SL!=='undefined' && SL[b.status]) ? SL[b.status] : b.status;
      var dep=b.deposit||0, ci=b.paidAtCheckIn||0;
      var ch=(b.status==='checkedout'?(b.chargesTotal||0):0)+(isCheckedInWeb(b)?(b.checkinCharges||0):0);
      if (b.status==='checkedout' && !b.paidAtCheckIn && ci===0) ci=Math.max(0, b.totalAmount-(b.discount||0)-dep);
      var parts=[];
      if (ci>0) parts.push('Phòng '+money(ci));
      if (dep>0) parts.push('Cọc '+money(dep));
      if (ch>0) parts.push('Phụ thu '+money(ch));
      h += '<div onclick="closeModal();openBKDetail('+b.id+')" style="cursor:pointer;display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(124,106,78,0.08)">';
      h += '<div style="min-width:0;flex:1"><div style="font-size:13px;font-weight:600;color:#2E2416">'+b.guest+' <span style="font-size:11px;color:var(--t3);font-weight:400">›</span></div>';
      h += '<div style="font-size:11px;color:var(--t3);margin-top:2px">'+fD(b.checkIn)+' → '+fD(b.checkOut)+' · '+n+' đêm · '+stLabel+'</div>';
      if (parts.length) h += '<div style="font-size:10.5px;color:#8A7A5E;margin-top:2px">'+parts.join(' · ')+'</div>';
      h += '</div>';
      h += '<div style="font-size:13px;font-weight:700;color:#3A6037;white-space:nowrap;font-variant-numeric:tabular-nums">'+money(rec)+'</div>';
      h += '</div>';
    });
  }

  // Khoản CHI — từng khoản
  h += '<div style="font-size:12px;font-weight:700;color:#B85C4A;margin:18px 0 8px">💸 KHOẢN CHI'+(exps.length?' · '+exps.length+' khoản':'')+'</div>';
  if (!exps.length) {
    h += '<div style="text-align:center;padding:16px;color:var(--t3);font-size:12px">📭 Không có khoản chi</div>';
  } else {
    exps.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).forEach(function(e){
      var col = catColors[e.cat]||'#B5A48A';
      h += '<div style="display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(124,106,78,0.08)">';
      h += '<div style="min-width:0;flex:1"><div style="font-size:13px;font-weight:600;color:#2E2416;display:flex;align-items:center;gap:7px"><span style="width:8px;height:8px;border-radius:50%;background:'+col+';flex-shrink:0"></span>'+(e.desc||e.cat)+'</div>';
      h += '<div style="font-size:11px;color:var(--t3);margin-top:2px;margin-left:15px">'+fD(e.date)+' · '+e.cat+'</div></div>';
      h += '<div style="font-size:13px;font-weight:700;color:#B85C4A;white-space:nowrap;font-variant-numeric:tabular-nums">'+money(e.amount)+'</div>';
      h += '</div>';
    });
  }
  showModal(h);
}

function renderStatistics() {
  _initStatFilter();
  var allBK = BOOKINGS;
  function bookingDate(b) { return new Date(b.checkIn); }

  // ───── Filter bar ─────
  var h = '<div class="stat-filter-bar"><div class="stat-filter-tabs">';
  var modes = [
    {k:'day', label:'📅 Theo ngày'},
    {k:'month', label:'📊 Bán niên (6 tháng)'},
    {k:'year', label:'📈 Cả năm'},
    {k:'range', label:'🎯 Khoảng tùy chọn'}
  ];
  modes.forEach(function(m){
    var on = statFilter.mode === m.k;
    h += '<button class="stat-tab' + (on?' on':'') + '" onclick="setStatMode(\''+m.k+'\')">'+m.label+'</button>';
  });
  h += '<button class="stat-tab" style="margin-left:auto;background:#3A6037;color:#FDFBF6;border-color:#2A4626" onclick="exportStatisticsExcel()" title="Xuất báo cáo Excel">📥 Excel</button>';
  h += '</div>';

  if (statFilter.mode === 'day') {
    h += '<div class="stat-filter-sub">';
    h += '<label>Tháng:</label><select id="sm" onchange="setStatMonthYear(this.value, document.getElementById(\'sy\').value)">';
    for (var m=0; m<12; m++) h += '<option value="'+m+'"'+(m===statFilter.monthYear.month?' selected':'')+'>Tháng '+(m+1)+'</option>';
    h += '</select>';
    h += '<label>Năm:</label><select id="sy" onchange="setStatMonthYear(document.getElementById(\'sm\').value, this.value)">';
    for (var y=yr-2; y<=yr+1; y++) h += '<option value="'+y+'"'+(y===statFilter.monthYear.year?' selected':'')+'>'+y+'</option>';
    h += '</select></div>';
  } else if (statFilter.mode === 'year') {
    h += '<div class="stat-filter-sub"><label>Năm:</label><select onchange="setStatYear(this.value)">';
    for (var y=yr-3; y<=yr+1; y++) h += '<option value="'+y+'"'+(y===statFilter.year?' selected':'')+'>'+y+'</option>';
    h += '</select></div>';
  } else if (statFilter.mode === 'range') {
    h += '<div class="stat-filter-sub"><label>Từ:</label><input type="date" id="sf-from" value="'+statFilter.from+'"/>';
    h += '<label>Đến:</label><input type="date" id="sf-to" value="'+statFilter.to+'"/>';
    h += '<button class="btn btn-gold btn-sm" onclick="setStatRange()">Áp dụng</button></div>';
  }
  h += '</div>';

  // ───── Compute data ─────
  var periodLabel = '';
  var bkInPeriod = [];
  var expInPeriod = [];
  var chartData = [];

  if (statFilter.mode === 'day') {
    var m = statFilter.monthYear.month, y = statFilter.monthYear.year;
    var dim = new Date(y, m+1, 0).getDate();
    var pStart = new Date(y, m, 1), pEnd = new Date(y, m, dim, 23,59,59);
    periodLabel = 'Tháng ' + (m+1) + ' / ' + y;
    bkInPeriod = allBK.filter(function(b){ var d=bookingDate(b); return d>=pStart && d<=pEnd; });
    expInPeriod = EXPENSES.filter(function(e){ var d=new Date(e.date); return d>=pStart && d<=pEnd; });
    for (var day=1; day<=dim; day++) {
      var dStr = y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      var bks = bkInPeriod.filter(function(b){ var bd=bookingDate(b); return bd.getDate()===day&&bd.getMonth()===m&&bd.getFullYear()===y; });
      var exps = expInPeriod.filter(function(e){ var ed=new Date(e.date); return ed.getDate()===day&&ed.getMonth()===m&&ed.getFullYear()===y; });
      chartData.push({label: String(day).padStart(2,'0'), fullLabel: dStr,
        rev: bks.reduce(function(s,b){return s+actualReceived(b);},0),
        exp: exps.reduce(function(s,e){return s+e.amount;},0), cnt: bks.length});
    }
  } else if (statFilter.mode === 'month') {
    // Bán niên kế toán: nửa đầu năm (T1-T6) hoặc nửa cuối năm (T7-T12)
    var halfStart, halfEnd, halfLabel;
    if (mn < 6) {
      // Đang ở nửa đầu năm → hiện T1 → T6
      halfStart = 0; halfEnd = 5;
      halfLabel = 'Nửa đầu năm ' + yr + ' (T1 → T6)';
    } else {
      // Đang ở nửa cuối năm → hiện T7 → T12
      halfStart = 6; halfEnd = 11;
      halfLabel = 'Nửa cuối năm ' + yr + ' (T7 → T12)';
    }
    periodLabel = halfLabel;

    for (var m = halfStart; m <= halfEnd; m++) {
      var bks = allBK.filter(function(b){ var d=bookingDate(b); return d.getMonth()===m&&d.getFullYear()===yr; });
      var exps = EXPENSES.filter(function(e){ var d=new Date(e.date); return d.getMonth()===m&&d.getFullYear()===yr; });
      bkInPeriod = bkInPeriod.concat(bks);
      expInPeriod = expInPeriod.concat(exps);
      var isCurrent = m === mn;
      var isFuture = m > mn;
      chartData.push({
        label: 'T'+(m+1),
        fullLabel: 'Tháng '+(m+1)+'/'+yr + (isFuture?' (sắp tới)':''),
        rev: bks.reduce(function(s,b){return s+actualReceived(b);},0),
        exp: exps.reduce(function(s,e){return s+e.amount;},0),
        cnt: bks.length,
        isFuture: isFuture,
        isCurrent: isCurrent
      });
    }
  } else if (statFilter.mode === 'year') {
    var y = statFilter.year;
    periodLabel = 'Năm ' + y;
    for (var m=0; m<12; m++) {
      var bks = allBK.filter(function(b){ var d=bookingDate(b); return d.getMonth()===m&&d.getFullYear()===y; });
      var exps = EXPENSES.filter(function(e){ var d=new Date(e.date); return d.getMonth()===m&&d.getFullYear()===y; });
      bkInPeriod = bkInPeriod.concat(bks);
      expInPeriod = expInPeriod.concat(exps);
      chartData.push({label:'T'+(m+1), fullLabel:'Tháng '+(m+1)+'/'+y,
        rev: bks.reduce(function(s,b){return s+actualReceived(b);},0),
        exp: exps.reduce(function(s,e){return s+e.amount;},0), cnt: bks.length});
    }
  } else if (statFilter.mode === 'range') {
    periodLabel = 'Từ ' + fD(statFilter.from) + ' → ' + fD(statFilter.to);
    var pStart = new Date(statFilter.from), pEnd = new Date(statFilter.to + 'T23:59:59');
    bkInPeriod = allBK.filter(function(b){ var d=bookingDate(b); return d>=pStart && d<=pEnd; });
    expInPeriod = EXPENSES.filter(function(e){ var d=new Date(e.date); return d>=pStart && d<=pEnd; });
    var cur = new Date(pStart);
    while (cur <= pEnd) {
      var ds = fmt(cur);
      var bks = bkInPeriod.filter(function(b){ return fmt(bookingDate(b))===ds; });
      var exps = expInPeriod.filter(function(e){ return e.date===ds; });
      chartData.push({label: String(cur.getDate()).padStart(2,'0')+'/'+String(cur.getMonth()+1).padStart(2,'0'),
        fullLabel: ds,
        rev: bks.reduce(function(s,b){return s+actualReceived(b);},0),
        exp: exps.reduce(function(s,e){return s+e.amount;},0), cnt: bks.length});
      cur.setDate(cur.getDate()+1);
    }
  }

  var totalReceived = bkInPeriod.reduce(function(s,b){return s+actualReceived(b);},0);
  var totalExp = expInPeriod.reduce(function(s,e){return s+e.amount;},0);
  var totalProfit = totalReceived - totalExp;
  window._statPeriod = {bkInPeriod: bkInPeriod, expInPeriod: expInPeriod, periodLabel: periodLabel};
  var totalNights = bkInPeriod.reduce(function(s,b){return s+nights(b.checkIn,b.checkOut);},0);
  var avgRevPerBk = bkInPeriod.length ? totalReceived/bkInPeriod.length : 0;
  var profitMargin = totalReceived ? (totalProfit/totalReceived*100) : 0;
  var maxV = Math.max.apply(null, chartData.map(function(d){return Math.max(d.rev,d.exp);}).concat([1]));

  // ───── HERO: Lợi nhuận chính ─────
  h += '<div class="stat-hero">';
  h += '<div class="stat-hero-label">📊 Lợi nhuận — ' + periodLabel + '</div>';
  h += '<div class="stat-hero-value ' + (totalProfit>=0?'green':'red') + '">' + (totalProfit>=0?'+':'') + money(totalProfit) + '</div>';
  h += '<div class="stat-hero-sub">';
  if (totalReceived > 0) {
    h += '<span style="color:#3A6037">▲ Thu ' + money(totalReceived) + '</span>';
    h += '<span style="margin:0 10px;color:var(--t3)">─</span>';
    h += '<span style="color:#B85C4A">▼ Chi ' + money(totalExp) + '</span>';
    h += '<span style="margin-left:14px;font-size:11px;color:var(--t3)">· Tỷ suất LN: ' + profitMargin.toFixed(1) + '%</span>';
  } else {
    h += '<span style="color:var(--t3)">Chưa có dữ liệu trong khoảng này</span>';
  }
  h += '</div></div>';

  // ───── 3 KPI cards ─────
  h += '<div class="stat-kpi-grid">';
  h += '<div class="stat-kpi green"><div class="stat-kpi-label">💵 Thực thu</div>'
    + '<div class="stat-kpi-value">' + money(totalReceived) + '</div>'
    + '<div class="stat-kpi-sub">' + bkInPeriod.length + ' booking · ' + totalNights + ' đêm</div></div>';
  h += '<div class="stat-kpi red"><div class="stat-kpi-label">💸 Chi phí</div>'
    + '<div class="stat-kpi-value">' + money(totalExp) + '</div>'
    + '<div class="stat-kpi-sub">' + expInPeriod.length + ' khoản chi</div></div>';
  h += '<div class="stat-kpi profit"><div class="stat-kpi-label">📈 Doanh thu TB / booking</div>'
    + '<div class="stat-kpi-value">' + money(avgRevPerBk) + '</div>'
    + '<div class="stat-kpi-sub">' + (totalNights ? money(totalReceived/totalNights) + '/đêm' : '—') + '</div></div>';
  h += '</div>';

  // ───── CHART ─────
  var chartTitle = statFilter.mode==='day' ? 'Thu chi từng ngày'
                 : statFilter.mode==='month' ? 'Thu chi bán niên' + (mn<6?' — Nửa đầu năm':' — Nửa cuối năm')
                 : statFilter.mode==='year' ? 'Thu chi 12 tháng'
                 : 'Thu chi theo ngày';
  h += '<div class="stat-section">';
  h += '<div class="stat-section-title"><h3>📊 ' + chartTitle + '</h3>';
  h += '<div class="sub-info"><span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px"><span style="width:9px;height:9px;background:#5E7E5B;border-radius:2px"></span>Thu</span>';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:9px;height:9px;background:#B85C4A;border-radius:2px"></span>Chi</span></div></div>';
  if (!chartData.length || !chartData.some(function(d){return d.rev>0||d.exp>0;})) {
    h += '<div style="text-align:center;padding:40px 20px;color:var(--t3);font-size:13px">📭 Không có dữ liệu trong khoảng này</div>';
  } else {
    h += '<div style="overflow-x:auto;padding:8px 0 4px"><div class="bar-chart" style="min-width:'+(chartData.length*42)+'px;height:140px">';
    chartData.forEach(function(d){
      var rH = maxV>0?(d.rev/maxV*110):0;
      var eH = maxV>0?(d.exp/maxV*110):0;
      var isToday = d.fullLabel === todayS;
      var isFuture = d.isFuture;
      // Tháng tương lai: dùng opacity nhẹ + viền dashed để phân biệt
      var futureStyle = isFuture ? 'opacity:0.78;border:1px dashed rgba(124,106,78,0.4);border-radius:5px;padding:1px' : '';
      h += '<div class="bbar" style="min-width:32px"><div class="bbar-in" style="height:110px;'+futureStyle+'">';
      h += '<div class="bg-g" style="height:'+rH+'%;min-height:'+(d.rev>0?3:0)+'px" title="'+d.fullLabel+' · Thu: '+money(d.rev)+'"></div>';
      h += '<div class="bg-r" style="height:'+eH+'%;min-height:'+(d.exp>0?3:0)+'px" title="'+d.fullLabel+' · Chi: '+money(d.exp)+'"></div>';
      h += '</div><div style="font-size:10px;color:'+(isToday?'#5C4E38':isFuture?'#7C6A4E':'var(--t3)')+';font-weight:'+(isToday||isFuture?700:500)+';white-space:nowrap;margin-top:4px">'+d.label+'</div></div>';
    });
    h += '</div></div>';
  }
  h += '</div>';

  // ───── DETAIL TABLE ─────
  var detailTitle = statFilter.mode==='day' ? 'Chi tiết từng ngày'
                  : statFilter.mode==='month' ? 'Chi tiết bán niên' + (mn<6?' (nửa đầu năm)':' (nửa cuối năm)')
                  : statFilter.mode==='year' ? 'Chi tiết 12 tháng'
                  : 'Chi tiết từng ngày';
  var nonZeroData = chartData.filter(function(d){return d.rev>0||d.exp>0||d.cnt>0;});
  h += '<div class="stat-section">';
  h += '<div class="stat-section-title"><h3>📋 ' + detailTitle + '</h3><div class="sub-info">' + nonZeroData.length + ' / ' + chartData.length + ' kỳ có hoạt động</div></div>';
  if (!nonZeroData.length) {
    h += '<div style="text-align:center;padding:40px 20px;color:var(--t3);font-size:13px">📭 Không có hoạt động</div>';
  } else {
    h += '<div style="max-height:420px;overflow-y:auto"><table class="stat-table">'
      + '<thead><tr><th>' + (statFilter.mode==='day'||statFilter.mode==='range' ? 'Ngày' : 'Tháng') + '</th><th class="center">Booking</th><th class="num">Thực thu</th><th class="num">Chi phí</th><th class="num">Lợi nhuận</th></tr></thead><tbody>';
    nonZeroData.forEach(function(d){
      var profit = d.rev - d.exp;
      var isToday = d.fullLabel === todayS;
      var isFuture = d.isFuture;
      var rowClass = isToday ? ' class="today"' : '';
      var futureBadge = isFuture ? ' <span style="background:#A07840;color:#FDFBF6;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:5px;text-transform:uppercase;letter-spacing:0.5px">Sắp tới</span>' : '';
      h += '<tr' + rowClass + (isFuture?' style="background:rgba(160,120,64,0.05)"':'') + '>';
      h += '<td>' + (statFilter.mode==='day'||statFilter.mode==='range' ? fD(d.fullLabel) : d.fullLabel.replace(' (sắp tới)','')) + futureBadge + '</td>';
      h += '<td class="center" style="color:#5A7A96">' + (d.cnt||'—') + '</td>';
      h += '<td class="num" style="color:#3A6037">' + (d.rev>0?money(d.rev):'—') + '</td>';
      h += '<td class="num" style="color:#B85C4A">' + (d.exp>0?money(d.exp):'—') + '</td>';
      h += '<td class="num" style="color:' + (profit>=0?'#3A6037':'#B85C4A') + '">' + (profit>0?'+':'') + money(profit) + '</td></tr>';
    });
    h += '<tr class="totals">';
    h += '<td>Tổng</td>';
    h += '<td class="center">' + bkInPeriod.length + '</td>';
    h += '<td class="num" style="color:#3A6037">' + money(totalReceived) + '</td>';
    h += '<td class="num" style="color:#B85C4A">' + money(totalExp) + '</td>';
    h += '<td class="num" style="color:' + (totalProfit>=0?'#3A6037':'#B85C4A') + '">' + (totalProfit>0?'+':'') + money(totalProfit) + '</td></tr>';
    h += '</tbody></table></div>';
  }
  h += '</div>';

  // ───── Bóc tách Khoản THU / Khoản CHI theo kỳ ─────
  // Khoản thu: cọc + tiền phòng (thu khi nhận nhà) + phụ thu & phạt
  var incCoc=0, incPhong=0, incPhu=0;
  bkInPeriod.forEach(function(b){
    var dep=b.deposit||0, ci=b.paidAtCheckIn||0, ch=b.chargesTotal||0;
    if (b.status==='checkedout' && !b.paidAtCheckIn && ci===0) ci=Math.max(0, b.totalAmount-(b.discount||0)-dep);
    incCoc+=dep; incPhong+=ci; incPhu+=ch;
  });
  var totalDiscount = bkInPeriod.reduce(function(s,b){return s+(b.discount||0);},0);
  var incItems=[
    {name:'🏠 Tiền phòng (thu khi nhận nhà)', amt:incPhong, col:'#3A6037'},
    {name:'🔑 Tiền cọc', amt:incCoc, col:'#A07840'},
    {name:'➕ Phụ thu & phạt', amt:incPhu, col:'#7A6890'}
  ];

  // Khoản chi theo danh mục
  var byCat = {};
  expInPeriod.forEach(function(e){byCat[e.cat]=(byCat[e.cat]||0)+e.amount;});
  var catColors = {'Điện nước':'#5A7A96','Dọn dẹp':'#5E7E5B','Sửa chữa':'#A07840','Vật tư':'#7A6890','Lương':'#B85C4A','Khác':'#B5A48A'};
  var catEntries = Object.entries(byCat).sort(function(a,b){return b[1]-a[1];});

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">';

  // ── LEFT: Khoản THU ──
  h += '<div class="stat-section"><div class="stat-section-title"><h3>💵 Khoản thu — ' + periodLabel + '</h3><div class="sub-info">Tổng: <strong style="color:#3A6037">' + money(totalReceived) + '</strong></div></div>';
  if (totalReceived <= 0) {
    h += '<div style="text-align:center;padding:40px 20px;color:var(--t3);font-size:13px">📭 Không có khoản thu</div>';
  } else {
    incItems.forEach(function(it){
      if (it.amt<=0) return;
      var pct=Math.round(it.amt/(totalReceived||1)*100);
      h += '<div class="cat-row">';
      h += '<div class="cat-row-l"><span class="dot" style="background:'+it.col+'"></span><span>'+it.name+'</span></div>';
      h += '<div class="cat-row-r"><div class="cat-row-amt" style="color:'+it.col+'">'+money(it.amt)+'</div><div class="cat-row-pct">'+pct+'% tổng thu</div></div>';
      h += '<div class="cat-row-bar"><div style="width:'+pct+'%;background:'+it.col+'"></div></div>';
      h += '</div>';
    });
    if (totalDiscount>0) {
      h += '<div style="margin-top:10px;padding-top:9px;border-top:1px dashed rgba(124,106,78,0.2);font-size:12px;color:var(--t3);display:flex;justify-content:space-between"><span>Đã giảm giá cho khách</span><span style="color:#B85C4A;font-weight:600">−'+money(totalDiscount)+'</span></div>';
    }
  }
  h += '</div>';

  // ── RIGHT: Khoản CHI (liệt kê chi tiết từng khoản) ──
  h += '<div class="stat-section"><div class="stat-section-title"><h3>💸 Khoản chi — ' + periodLabel + '</h3><div class="sub-info">' + expInPeriod.length + ' khoản · Tổng: <strong style="color:#B85C4A">' + money(totalExp) + '</strong></div></div>';
  if (!expInPeriod.length) {
    h += '<div style="text-align:center;padding:40px 20px;color:var(--t3);font-size:13px">📭 Không có khoản chi</div>';
  } else {
    h += '<div style="max-height:340px;overflow-y:auto">';
    expInPeriod.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).forEach(function(e){
      var col = catColors[e.cat]||'#B5A48A';
      var hm = HOMES.find(function(x){return x.id===e.homeId;});
      var hmLabel = hm ? (hm.emoji+' '+hm.name) : '';
      h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(124,106,78,0.08)">';
      h += '<div style="min-width:0;flex:1">';
      h += '<div style="font-size:13px;font-weight:600;color:#2E2416;display:flex;align-items:flex-start;gap:7px"><span style="width:8px;height:8px;border-radius:50%;background:'+col+';flex-shrink:0;margin-top:5px"></span><span>'+(e.desc||e.cat)+'</span></div>';
      h += '<div style="font-size:11px;color:var(--t3);margin-top:2px;margin-left:15px">'+fD(e.date)+' · '+e.cat+(hmLabel?' · '+hmLabel:'')+'</div>';
      h += '</div>';
      h += '<div style="font-size:14px;font-weight:700;color:#B85C4A;white-space:nowrap;font-variant-numeric:tabular-nums lining-nums">'+money(e.amount)+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div></div>';

  // ───── Home performance (full-width) ─────
  var byHomeP = HOMES.map(function(hm){
    var hBK = bkInPeriod.filter(function(b){return b.homeId===hm.id;});
    return {id:hm.id, emoji:hm.emoji, name:hm.name, cnt:hBK.length,
      nights:hBK.reduce(function(s,b){return s+nights(b.checkIn,b.checkOut);},0),
      received:hBK.reduce(function(s,b){return s+actualReceived(b);},0)};
  });
  var maxHR = Math.max.apply(null, byHomeP.map(function(h){return h.received;}).concat([1]));

  h += '<div class="stat-section"><div class="stat-section-title"><h3>🏡 Hiệu suất căn nhà</h3><div class="sub-info">' + HOMES.length + ' căn</div></div>';
  if (!HOMES.length || !byHomeP.some(function(h){return h.received>0||h.cnt>0;})) {
    h += '<div style="text-align:center;padding:40px 20px;color:var(--t3);font-size:13px">📭 Không có hoạt động</div>';
  } else {
    var homeColors = ['#7C6A4E','#5A7A96','#7A6890','#5E7E5B','#A07840'];
    byHomeP.slice().sort(function(a,b){return b.received-a.received;}).forEach(function(hm,i){
      var pct = maxHR>0?Math.round(hm.received/maxHR*100):0;
      var col = homeColors[i%homeColors.length];
      h += '<div class="home-perf-card" onclick="openHomePerf('+hm.id+')" style="cursor:pointer" title="Bấm để xem thu chi căn này">';
      h += '<div class="home-perf-head">';
      h += '<div><div class="home-perf-name">' + hm.emoji + ' ' + hm.name + ' <span style="font-size:11px;color:var(--t3);font-weight:400">›</span></div>';
      h += '<div class="home-perf-meta">' + hm.cnt + ' booking · ' + hm.nights + ' đêm</div></div>';
      h += '<div><div class="home-perf-amt">' + money(hm.received) + '</div>';
      h += '<div class="home-perf-amt-meta">' + (hm.nights ? money(hm.received/hm.nights)+'/đêm' : '—') + '</div></div>';
      h += '</div>';
      h += '<div class="home-perf-bar"><div style="width:'+pct+'%;background:'+col+'"></div></div>';
      h += '</div>';
    });
  }
  h += '</div>';

  // ───── Booking status overview ─────
  var statusCount = {confirmed:0, checkedin:0, 'checkout-today':0, checkedout:0};
  bkInPeriod.forEach(function(b){statusCount[b.status]=(statusCount[b.status]||0)+1;});
  var SL_FULL = {confirmed:'Đã đặt', checkedin:'Đang ở', 'checkout-today':'Trả hôm nay', checkedout:'Đã trả'};
  var SC_COLOR = {confirmed:'#A07840', checkedin:'#5A7A96', 'checkout-today':'#B85C4A', checkedout:'#3A6037'};

  if (bkInPeriod.length > 0) {
    h += '<div class="stat-section"><div class="stat-section-title"><h3>📋 Tổng quan trạng thái booking</h3><div class="sub-info">' + bkInPeriod.length + ' booking</div></div>';
    h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">';
    Object.entries(statusCount).forEach(function(entry){
      var st = entry[0], cnt = entry[1];
      var pct = bkInPeriod.length ? Math.round(cnt/bkInPeriod.length*100) : 0;
      var col = SC_COLOR[st];
      h += '<div style="background:#F8F4EC;border:1px solid rgba(124,106,78,0.15);border-left:3px solid '+col+';border-radius:10px;padding:13px 15px">';
      h += '<div style="font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:4px">'+SL_FULL[st]+'</div>';
      h += '<div style="font-size:22px;font-weight:800;color:'+col+';font-family:\'Playfair Display\',serif;line-height:1">'+cnt+'</div>';
      h += '<div style="font-size:11px;color:var(--t3);margin-top:3px">'+pct+'% tổng</div>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  return h;
}

/* ═══════════ FINANCE ═══════════ */
function renderFinance() {
  // ── Tính các số liệu chung ──
  var totalReceived = BOOKINGS.reduce(function(s,b){ return s + actualReceived(b); }, 0);
  var holdingDep = BOOKINGS.filter(function(b){ return b.status!=='checkedout'; })
                           .reduce(function(s,b){ return s + (b.deposit||0); }, 0);
  var stillPending = BOOKINGS.reduce(function(s,b){ return s + stillOwed(b); }, 0);

  var mReceived = BOOKINGS.filter(function(b){
    var d = new Date(b.checkIn);
    return d.getMonth()===mn && d.getFullYear()===yr;
  }).reduce(function(s,b){ return s + actualReceived(b); }, 0);

  var mExp = EXPENSES.filter(function(e){
    var d=new Date(e.date); return d.getMonth()===mn&&d.getFullYear()===yr;
  }).reduce(function(s,e){ return s+e.amount; }, 0);

  var mProfit = mReceived - mExp;

  var h = '';

  // ───── HERO: Lợi nhuận tháng ─────
  h += '<div class="stat-hero">';
  h += '<div class="stat-hero-label">📊 Lợi nhuận tháng ' + (mn+1) + ' / ' + yr + '</div>';
  h += '<div class="stat-hero-value ' + (mProfit>=0?'green':'red') + '">' + (mProfit>=0?'+':'') + money(mProfit) + '</div>';
  h += '<div class="stat-hero-sub">';
  h += '<span style="color:#3A6037">▲ Thu ' + money(mReceived) + '</span>';
  h += '<span style="margin:0 10px;color:var(--t3)">─</span>';
  h += '<span style="color:#B85C4A">▼ Chi ' + money(mExp) + '</span>';
  h += '</div></div>';

  // ───── 4 KPI ─────
  h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">';
  h += '<div class="stat-kpi green"><div class="stat-kpi-label">💵 Thực thu tháng</div>'
    + '<div class="stat-kpi-value">' + money(mReceived) + '</div>'
    + '<div class="stat-kpi-sub">Cọc + nhận nhà + phụ thu</div></div>';
  h += '<div class="stat-kpi" style="border-left:4px solid #A07840"><div class="stat-kpi-label">💰 Đang giữ cọc</div>'
    + '<div class="stat-kpi-value" style="color:#A07840">' + money(holdingDep) + '</div>'
    + '<div class="stat-kpi-sub">Booking chưa nhận nhà</div></div>';
  h += '<div class="stat-kpi" style="border-left:4px solid #5A7A96"><div class="stat-kpi-label">⏳ Còn phải thu</div>'
    + '<div class="stat-kpi-value" style="color:#5A7A96">' + money(stillPending) + '</div>'
    + '<div class="stat-kpi-sub">Khi khách nhận nhà</div></div>';
  h += '<div class="stat-kpi red"><div class="stat-kpi-label">💸 Chi phí tháng</div>'
    + '<div class="stat-kpi-value">' + money(mExp) + '</div>'
    + '<div class="stat-kpi-sub">' + EXPENSES.filter(function(e){var d=new Date(e.date);return d.getMonth()===mn&&d.getFullYear()===yr;}).length + ' khoản chi</div></div>';
  h += '</div>';

  // ───── Tab switcher ─────
  h += '<div class="stat-filter-bar"><div class="stat-filter-tabs">';
  h += '<button class="stat-tab on" id="ftab-thu" onclick="switchFTab(\'thu\')">💵 Nguồn thu</button>';
  h += '<button class="stat-tab" id="ftab-chi" onclick="switchFTab(\'chi\')">💸 Chi phí</button>';
  h += '</div></div>';

  h += '<div id="f-content">' + renderFinanceRevenue() + '</div>';
  return h;
}

function switchFTab(t) {
  document.querySelectorAll('.stat-tab[id^="ftab-"]').forEach(function(el){ el.classList.remove('on'); });
  var el = document.getElementById('ftab-'+t);
  if (el) el.classList.add('on');
  var fc = document.getElementById('f-content');
  if (!fc) return;
  fc.innerHTML = t==='thu' ? renderFinanceRevenue() : renderFinanceExpense();
}

function renderFinanceRevenue() {
  var rows = BOOKINGS.slice().sort(function(a,b){ return new Date(b.checkIn)-new Date(a.checkIn); });
  var totalRec = rows.reduce(function(s,b){ return s+actualReceived(b); }, 0);
  var totalDep = rows.reduce(function(s,b){ return s+(b.deposit||0); }, 0);
  var totalAtCI = rows.reduce(function(s,b){ return s+(b.paidAtCheckIn||0); }, 0);
  var totalCharges = rows.reduce(function(s,b){ return s+(b.chargesTotal||0)+(b.checkinCharges||0); }, 0);
  var totalOwed = rows.reduce(function(s,b){ return s+stillOwed(b); }, 0);

  var h = '';

  // Chú thích cách tính
  h += '<div class="stat-section" style="background:#F8F4EC;padding:14px 18px;margin-bottom:12px">';

    h += '<td class="num" style="color:#B85C4A;font-size:14px">'+money(e.amount)+'</td>';
    h += '<td class="center"><div style="display:inline-flex;gap:4px">';
    if (CU && CU.role==='admin') {
      h += '<button class="btn btn-xs btn-out" onclick="openEditExp('+e.id+')" title="Sửa">✏️</button>';
      h += '<button class="btn btn-xs btn-danger" onclick="delExp('+e.id+')" title="Xóa">🗑</button>';
    } else { h += '<span style="color:var(--t3);font-size:11px">—</span>'; }

  });

function _userModal(u){
  const isEdit=!!u?.id;
  const roleOpts=[['admin','Admin'],['manager','Quản lý'],['staff','Nhân viên']].map(([v,l])=>'<option value="'+v+'"'+(v===(u?.role||'staff')?' selected':'')+'>'+l+'</option>').join('');
  const actOpts='<option value="true"'+(u?.active!==false?' selected':'')+'>Hoạt động</option><option value="false"'+(u?.active===false?' selected':'')+'>Tạm khóa</option>';

    '<div class="mh"><div class="mt2">'+(isEdit?'✏️ Sửa':'➕ Thêm')+' tài khoản</div><button class="mc" onclick="closeModal()">✕</button></div>'
    +'<div class="fr2"><div class="fg"><label class="fl">Username *</label><input class="fc" id="u-un" value="'+(u?.username||'')+'" placeholder="username..."'+(isEdit?' disabled':'')+'/></div>'
    +'<div class="fg"><label class="fl">Mật khẩu'+(isEdit?' (trống=giữ)':' *')+'</label><input type="password" class="fc" id="u-pw" placeholder="••••••••"/></div></div>'
    +'<div class="fr2"><div class="fg"><label class="fl">Họ và tên *</label><input class="fc" id="u-name" value="'+(u?.name||'')+'" placeholder="Tên đầy đủ..."/></div>'
    +'<div class="fg"><label class="fl">Email</label><input type="email" class="fc" id="u-email" value="'+(u?.email||'')+'" placeholder="email@..."/></div></div>'
    +'<div class="fr2"><div class="fg"><label class="fl">Vai trò</label><select class="fc" id="u-role">'+roleOpts+'</select></div>'
    +'<div class="fg"><label class="fl">Trạng thái</label><select class="fc" id="u-active">'+actOpts+'</select></div></div>'
    +'<div class="mfoot"><button class="btn btn-out" onclick="closeModal()">Hủy</button><button class="btn btn-gold" onclick="saveUser('+(isEdit?u.id:0)+')">'+( isEdit?'Cập nhật':'Tạo')+'</button></div>',
    'sm'
  );
}
function openAddUser(){_userModal(null);}
function openEditUser(id){_userModal(USERS.find(u=>u.id===id));}
async function saveUser(id){
  const un=document.getElementById('u-un')?.value?.trim();
  const pw=document.getElementById('u-pw')?.value;
  const nm=document.getElementById('u-name')?.value?.trim();
  if(!nm){toast('Nhập họ tên','warn');return;}
  if(!id&&(!un||!pw)){toast('Nhập username và mật khẩu','warn');return;}
  setLoading(true);
  try {
    const payload = {
      name: nm,
      email: document.getElementById('u-email')?.value || null,
      role: ROLE_UI_TO_API[document.getElementById('u-role')?.value || 'staff'],
      active: document.getElementById('u-active')?.value === 'true'
    };
    if (pw) payload.password = pw;
    if (id) {
      await api.patch('/users/' + id, payload);
    } else {
      payload.username = un;
      await api.post('/users', payload);
    }
    await reloadUsers();
    closeModal();
    toast(id ? 'Đã cập nhật tài khoản' : 'Đã tạo tài khoản', 'success');
    setPage(curPage);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(false);
  }
}
async function delUser(id){
  if(!confirm('Xóa tài khoản này?')) return;
  setLoading(true);
  try {
    await api.delete('/users/' + id);
    await reloadUsers();
    toast('Đã xóa', 'success');
    setPage(curPage);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(false);
  }
}

      +'<td><span style="font-weight:700;color:#5C4E38">'+money(hm.price)+'</span>'+((hm.weekendPrice&&hm.weekendPrice>0&&hm.weekendPrice!==hm.price)?'<br><span style="font-size:10px;color:#B85C4A;font-weight:600">CT: '+money(hm.weekendPrice)+'</span>':'')+'</td>'

      +'<td style="font-weight:600;color:#5A7A96">'+cnt+'</td>'
      +'<td style="font-weight:600;color:#3A6037">'+mS(rev)+'</td>'
      +'<td><div style="display:flex;gap:4px"><button class="btn btn-xs btn-out" onclick="openEditHome('+hm.id+')">✏️ Sửa</button><button class="btn btn-xs btn-danger" onclick="delHome('+hm.id+')">🗑 Xóa</button></div></td></tr>';
  });
  h+='</tbody></table></div></div>';

    +'</div>'

    +'<div class="mfoot"><button class="btn btn-out" onclick="closeModal()">Hủy</button><button class="btn btn-gold" onclick="saveHome('+(isEdit?hm.id:0)+')">'+( isEdit?'Cập nhật':'Tạo căn nhà')+'</button></div>'

function openAddHome(){_homeModal(null);}
function openEditHome(id){_homeModal(HOMES.find(h=>h.id===id));}
function selEmoji(e,btn){
  document.getElementById('h-emoji').value=e;
  document.querySelectorAll('#ep button').forEach(function(b){b.style.borderColor='transparent';b.style.background='transparent';b.classList.remove('sel-em');});
  btn.style.borderColor='#7C6A4E';btn.style.background='rgba(124,106,78,0.15)';btn.classList.add('sel-em');
}
async function saveHome(id){
  const name=document.getElementById('h-name')?.value?.trim();
  const addr=document.getElementById('h-addr')?.value?.trim();
  const price=parseNum(document.getElementById('h-price')?.value);
  const wkRaw=document.getElementById('h-wkprice')?.value;
  const weekendPrice=(wkRaw==='' || wkRaw==null || wkRaw.replace(/\D/g,'')==='')?null:(parseNum(wkRaw)||null);
  const maxG=parseInt(document.getElementById('h-maxg')?.value)||8;
  const emoji=document.getElementById('h-emoji')?.value||'🏡';
  const desc=document.getElementById('h-desc')?.value||'';
  if(!name||!addr||!price){toast('Điền đủ: tên, địa chỉ, giá','warn');return;}
  setLoading(true);
  try {
    const payload = { name, address: addr, price, weekendPrice, maxGuests: maxG, emoji, desc };
    if (id) await api.patch('/homes/' + id, payload);
    else await api.post('/homes', payload);
    await reloadHomes();
    closeModal();
    toast(id ? 'Đã cập nhật căn nhà' : 'Đã thêm căn nhà', 'success');
    setPage(curPage);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(false);
  }
}
async function delHome(id){
  const hm=HOMES.find(x=>x.id===id); if(!hm)return;
  if (!confirm('Xóa căn nhà "'+hm.name+'"?')) return;
  setLoading(true);
  try {
    await api.delete('/homes/' + id);
    await reloadHomes();
    toast('Đã xóa căn nhà', 'success');
    setPage(curPage);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(false);
  }
}

/* ═══════════ CALENDAR DAY DETAIL ═══════════ */
function showDayDetail(dateStr) {
  // Lọc booking trong ngày
  var dayBookings = BOOKINGS.filter(function(b){
    // Kể cả booking đã trả (quá khứ) để xem lại được lịch sử.
    // Nhận hôm đó
    if (b.checkIn === dateStr) return true;
    // Trả hôm đó
    if (b.checkOut === dateStr) return true;
    // Đang ở hôm đó
    if (dateStr > b.checkIn && dateStr < b.checkOut) return true;
    return false;
  });

  var freeH = freeHomesOn(dateStr);
  var freeSection = freeH.length ? ('<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:#3A6037;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px">🟢 Căn còn trống đêm này ('+freeH.length+'/'+HOMES.length+')</div>'
    + freeH.map(function(h2){return '<span style="display:inline-block;background:rgba(94,126,91,0.12);color:#3A6037;border:1px solid rgba(94,126,91,0.3);border-radius:6px;padding:4px 9px;margin:0 6px 6px 0;font-size:12px;font-weight:600">'+h2.emoji+' '+h2.name+'</span>';}).join('')
    + '</div>') : '';

  if (!dayBookings.length) {
    showModal(
      '<div class="mh"><div class="mt2">📅 ' + fD(dateStr) + '</div><button class="mc" onclick="closeModal()">✕</button></div>'
      + freeSection
      + (freeH.length ? '' : '<div style="text-align:center;padding:30px;color:var(--t3)">Không có booking nào trong ngày này</div>')
      + '<div class="mfoot"><button class="btn btn-out" onclick="closeModal()">Đóng</button></div>',
      'sm'
    );
    return;
  }

  // Phân loại: nhận / trả / đang ở
  var ciList = dayBookings.filter(function(b){ return b.checkIn === dateStr; });
  var coList = dayBookings.filter(function(b){ return b.checkOut === dateStr && b.checkIn !== dateStr; });
  var stayList = dayBookings.filter(function(b){ return dateStr > b.checkIn && dateStr < b.checkOut; });

  var html = '<div class="mh"><div class="mt2">📅 ' + fD(dateStr) + ' — ' + dayBookings.length + ' booking</div><button class="mc" onclick="closeModal()">✕</button></div>';

  // Summary KPI
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">';
  html += '<div style="background:rgba(94,126,91,0.1);border-radius:7px;padding:9px 11px;border:1px solid rgba(94,126,91,0.25);text-align:center"><div style="font-size:18px;font-weight:700;color:#3A6037;font-family:\'Playfair Display\',serif">' + ciList.length + '</div><div style="font-size:10px;color:#3A6037;text-transform:uppercase;letter-spacing:0.5px">▶ Nhận nhà</div></div>';
  html += '<div style="background:rgba(90,122,150,0.08);border-radius:7px;padding:9px 11px;border:1px solid rgba(90,122,150,0.2);text-align:center"><div style="font-size:18px;font-weight:700;color:#5A7A96;font-family:\'Playfair Display\',serif">' + stayList.length + '</div><div style="font-size:10px;color:#5A7A96;text-transform:uppercase;letter-spacing:0.5px">· Đang ở</div></div>';
  html += '<div style="background:rgba(184,92,74,0.08);border-radius:7px;padding:9px 11px;border:1px solid rgba(184,92,74,0.25);text-align:center"><div style="font-size:18px;font-weight:700;color:#B85C4A;font-family:\'Playfair Display\',serif">' + coList.length + '</div><div style="font-size:10px;color:#B85C4A;text-transform:uppercase;letter-spacing:0.5px">■ Trả nhà</div></div>';
  html += '</div>';

  html += freeSection;

  // Section: Nhận nhà
  if (ciList.length) {
    html += '<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:#3A6037;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px">▶ Khách nhận nhà (' + ciList.length + ')</div>';
    ciList.forEach(function(b){
      var hm = gH(b.homeId);
      var rem = Math.max(0, b.totalAmount - (b.discount||0) - (b.deposit||0));
      html += '<div style="background:rgba(94,126,91,0.05);border:1px solid rgba(94,126,91,0.2);border-left:3px solid #5E7E5B;border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:7px">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
        + '<div style="flex:1"><div style="font-weight:700;font-size:13px">' + b.guest + '</div>'
        + '<div style="font-size:11px;color:var(--t2);margin-top:2px">📞 ' + b.phone + ' · ' + hm.emoji + ' ' + hm.name + ' · ' + b.guests + ' người</div>'
        + '<div style="font-size:11px;color:var(--t2);margin-top:2px">Vào lúc <span class="tp">' + b.checkInTime + '</span> → trả ' + fD(b.checkOut) + ' <span class="tp out">' + b.checkOutTime + '</span></div></div>'
        + '<div style="text-align:right"><div style="font-size:10px;color:var(--t3)">Thu khi nhận</div><div style="font-weight:700;color:' + (rem>0?'#B85C4A':'#3A6037') + '">' + (rem>0?money(rem):'Đủ ✓') + '</div></div></div>'
        + (b.notes ? '<div style="margin-top:6px;padding:5px 9px;background:var(--amd);border-radius:5px;font-size:11px;color:#7A5C30">📝 ' + b.notes + '</div>' : '')
        + '</div>';
    });
    html += '</div>';
  }

  // Section: Trả nhà
  if (coList.length) {
    html += '<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:#B85C4A;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px">■ Khách trả nhà (' + coList.length + ')</div>';
    coList.forEach(function(b){
      var hm = gH(b.homeId);
      html += '<div style="background:rgba(184,92,74,0.04);border:1px solid rgba(184,92,74,0.2);border-left:3px solid #B85C4A;border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:7px">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
        + '<div style="flex:1"><div style="font-weight:700;font-size:13px">' + b.guest + '</div>'
        + '<div style="font-size:11px;color:var(--t2);margin-top:2px">📞 ' + b.phone + ' · ' + hm.emoji + ' ' + hm.name + ' · ' + b.guests + ' người</div>'
        + '<div style="font-size:11px;color:var(--t2);margin-top:2px">Đã ở từ ' + fD(b.checkIn) + ' <span class="tp">' + b.checkInTime + '</span> → trả lúc <span class="tp out">' + b.checkOutTime + '</span></div></div>'
        + '<div style="text-align:right"><div style="font-size:10px;color:var(--t3)">Tổng tiền</div><div style="font-weight:700;color:#5C4E38">' + money(b.totalAmount) + '</div></div></div>'
        + '<div style="margin-top:6px;padding:5px 9px;background:rgba(160,120,64,0.1);border-radius:5px;font-size:10px;color:#7A5C30">⚠️ Quản gia xuống kiểm tra: điện nước, đồ đạc, thẻ từ</div>'
        + '</div>';
    });
    html += '</div>';
  }

  // Section: Đang ở
  if (stayList.length) {
    html += '<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:#5A7A96;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px">· Khách đang ở (' + stayList.length + ')</div>';
    stayList.forEach(function(b){
      var hm = gH(b.homeId);
      html += '<div style="background:rgba(90,122,150,0.04);border:1px solid rgba(90,122,150,0.18);border-left:3px solid #5A7A96;border-radius:0 8px 8px 0;padding:9px 13px;margin-bottom:6px">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px">'
        + '<div style="flex:1"><div style="font-weight:600;font-size:12px">' + b.guest + ' <span style="font-size:11px;color:var(--t2);font-weight:400">→ ' + hm.emoji + ' ' + hm.name + '</span></div>'
        + '<div style="font-size:10px;color:var(--t2);margin-top:2px">' + fD(b.checkIn) + ' → ' + fD(b.checkOut) + ' · ' + b.guests + ' người</div></div></div></div>';
    });
    html += '</div>';
  }

  html += '<div class="mfoot"><button class="btn btn-out" onclick="closeModal()">Đóng</button></div>';
  showModal(html);
}

      h += '<tr><td style="color:var(--t3);font-size:10px">#' + (i + 1) + '</td>'
        + '<td><span style="font-weight:500">' + q.name + '</span></td>'
        + '<td style="font-weight:600;color:#5A7A96">' + money(q.amount) + '<span style="font-size:10px;color:var(--t3);font-weight:400">/cái</span></td>'
        + '<td><div style="display:flex;gap:4px">'
        + '<button class="btn btn-xs btn-out" onclick="openEditQuick(' + q.id + ')">✏️</button>'
        + '<button class="btn btn-xs btn-danger" onclick="delQuick(' + q.id + ')">🗑</button>'
        + '</div></td></tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '</div>';

  h += '</div>'; // end 2-col

  // Preview area
  h += '<div class="card"><div class="ch"><div class="ct">👁 Xem trước — modal trả nhà sẽ hiện</div></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
    + '<div><div style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--t3);margin-bottom:7px">📋 Nội quy — phạt phụ thu</div>'
    + '<div class="quick-btns">'
    + RULES.map(function(r){return '<button class="btn btn-xs btn-danger" disabled style="opacity:0.85">' + r.name + ' (' + mS(r.amount) + ')</button>';}).join('')
    + '</div></div>'
    + '<div><div style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--t3);margin-bottom:7px">🛍 Tiêu thụ</div>'
    + '<div class="quick-btns">'
    + QUICK.map(function(q){return '<button class="btn btn-xs btn-sky" disabled style="opacity:0.85">' + q.name + ' (' + money(q.amount) + ')</button>';}).join('')
    + '</div></div>'
    + '</div></div>';

  return h;
}

function _ruleModal(r) {
  const isEdit = !!(r && r.id);
  showModal(
    '<div class="mh"><div class="mt2">' + (isEdit ? '✏️ Sửa' : '➕ Thêm') + ' nội quy phạt</div><button class="mc" onclick="closeModal()">✕</button></div>'
    + '<div class="fg"><label class="fl">Tên phạt *</label>'
    + '<input class="fc" id="rl-name" value="' + (r ? r.name : '') + '" placeholder="VD: Mất thẻ từ, Hút thuốc..."/></div>'
    + '<div class="fg"><label class="fl">Số tiền phạt (đ) *</label>'
    + '<input type="text" inputmode="numeric" class="fc" id="rl-amount" value="' + (r ? numVal(r.amount) : '') + '" placeholder="VD: 500.000" oninput="fmtNumInput(this)"/></div>'
    + '<div style="background:rgba(184,92,74,0.06);border-radius:7px;padding:9px 12px;font-size:11px;color:#7A5C30;border:1px solid rgba(184,92,74,0.15);margin-bottom:11px">'
    + '⚠ Mức phạt cố định, không cần số lượng. Chỉ áp dụng 1 lần khi vi phạm.'
    + '</div>'
    + '<div class="mfoot"><button class="btn btn-out" onclick="closeModal()">Hủy</button>'
    + '<button class="btn btn-gold" onclick="saveRule(' + (isEdit ? r.id : 0) + ')">' + (isEdit ? 'Cập nhật' : 'Tạo') + '</button></div>',
    'sm'
  );
}
function openAddRule() { _ruleModal(null); }
function openEditRule(id) { _ruleModal(RULES.find(function(r){return r.id===id;})); }
async function saveRule(id) {
  const name = document.getElementById('rl-name')?.value?.trim();
  const amount = parseNum(document.getElementById('rl-amount')?.value);
  if (!name || !amount) { toast('Điền tên và số tiền phạt', 'warn'); return; }
  setLoading(true);
  try {
    if (id) await api.patch('/charge-templates/' + id, { name, amount });
    else await api.post('/charge-templates', { name, amount, type: 'RULE' });
    await reloadCharges();
    closeModal();
    toast(id ? 'Đã cập nhật' : 'Đã thêm nội quy phạt', 'success');
    setPage(curPage);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(false);
  }
}
async function delRule(id) {
  const r = RULES.find(function(x){return x.id===id;});
  if (!r) return;
  if (!confirm('Xóa nội quy phạt "' + r.name + '"?')) return;
  setLoading(true);
  try {
    await api.delete('/charge-templates/' + id);
    await reloadCharges();
    toast('Đã xóa', 'success');
    setPage(curPage);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(false);
  }
}

/* ═══════════ EXPENSE CRUD ═══════════ */
function openAddExp(){_expModal(null);}
function openEditExp(id){_expModal(EXPENSES.find(function(e){return e.id===id;}));}
function _expModal(e){
  var isEdit = !!(e && e.id);
  var catOpts = CAT.map(function(c){
    return '<option'+(c===(e?e.cat:'Điện nước')?' selected':'')+'>'+c+'</option>';
  }).join('');
  var homeOpts = '<option value="">Chung</option>'+HOMES.map(function(h){
    return '<option value="'+h.id+'"'+(h.id===(e?e.homeId:0)?' selected':'')+'>'+h.emoji+' '+h.name+'</option>';
  }).join('');
  showModal(
    '<div class="mh"><div class="mt2">'+(isEdit?'✏️ Sửa':'➕ Thêm')+' chi phí</div><button class="mc" onclick="closeModal()">✕</button></div>'
    +'<div class="fr2">'
    +'<div class="fg"><label class="fl">Ngày</label><input type="date" class="fc" id="ex-date" value="'+(e?e.date:todayS)+'"/></div>'
    +'<div class="fg"><label class="fl">Danh mục</label><select class="fc" id="ex-cat">'+catOpts+'</select></div>'
    +'</div>'
    +'<div class="fg"><label class="fl">Mô tả *</label><input class="fc" id="ex-desc" value="'+(e?e.desc:'')+'" placeholder="Nội dung chi phí..."/></div>'
    +'<div class="fr2">'
    +'<div class="fg"><label class="fl">Số tiền (đ) *</label><input type="text" inputmode="numeric" class="fc" id="ex-amount" value="'+(e?numVal(e.amount):'')+'" placeholder="0" oninput="fmtNumInput(this)"/></div>'
    +'<div class="fg"><label class="fl">Căn nhà</label><select class="fc" id="ex-home">'+homeOpts+'</select></div>'
    +'</div>'
    +'<div class="mfoot"><button class="btn btn-out" onclick="closeModal()">Hủy</button>'
    +'<button class="btn btn-gold" onclick="saveExp('+(isEdit?e.id:0)+')">'+(isEdit?'Cập nhật':'Lưu')+'</button></div>',
    'sm'
  );
}
async function saveExp(id){
  var desc = document.getElementById('ex-desc')?.value?.trim();
  var amt = parseNum(document.getElementById('ex-amount')?.value);
  if(!desc||!amt){toast('Điền đủ mô tả và số tiền','warn');return;}
  var date = document.getElementById('ex-date')?.value||todayS;
  var cat = document.getElementById('ex-cat')?.value||'Khác';
  var homeIdVal = parseInt(document.getElementById('ex-home')?.value);
  setLoading(true);
  try {
    const payload = { date, category: cat, desc, amount: amt };
    if (homeIdVal) payload.homeId = homeIdVal;
    if (id) await api.patch('/expenses/' + id, payload);
    else await api.post('/expenses', payload);
    await reloadExpenses();
    closeModal();
    toast(id ? 'Đã cập nhật chi phí' : 'Đã thêm chi phí', 'success');
    setPage(curPage);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(false);
  }
}
async function delExp(id){
  if(!confirm('Xóa chi phí này?')) return;
  setLoading(true);
  try {
    await api.delete('/expenses/' + id);
    await reloadExpenses();
    toast('Đã xóa', 'success');
    setPage(curPage);
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setLoading(false);
  }
}

/* CAT constant if missing */
if (typeof CAT === 'undefined') { var CAT = ['Điện nước','Dọn dẹp','Sửa chữa','Vật tư','Lương','Khác']; }
